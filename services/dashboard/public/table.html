<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Dark Pilgrimage — Table</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #000; cursor: none; }
    canvas { display: block; width: 100%; height: 100%; }
    body.disconnected::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      border: 4px solid rgba(170, 30, 20, 0);
      box-sizing: border-box;
      animation: disconnect-pulse 2s ease-in-out infinite;
      z-index: 9999;
    }
    @keyframes disconnect-pulse {
      0%, 100% { border-color: rgba(170, 30, 20, 0.1); }
      50% { border-color: rgba(170, 30, 20, 0.5); }
    }
  </style>
</head>
<body>
<canvas id="map"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
// /table — PLAYER-FACING PROJECTION DISPLAY
// Strict rules:
//   1. Unrevealed fog = SOLID BLACK (zero visibility)
//   2. Player tokens (type:pc) always visible — unless absent/notYetArrived
//   3. NPC tokens visible ONLY if revealedToPlayers === true
//   4. Hidden tokens invisible regardless
//   5. Tokens fade in/out over 600ms when revealedToPlayers toggles
// ═══════════════════════════════════════════════════════════════

var ws = null;
var mapData = null;
var mapImage = null;
var tokens = {};
var fogRevealed = [];
var players = {};
// Per-token visibility transition: id -> { from, to, startTime, duration }
var visibilityTransitions = {};
// Per-token current opacity (0..1)
var tokenOpacity = {};

var cam = { x: 0, y: 0, zoom: 1 };
var canvas = document.getElementById('map');
var ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  centerCamera();
  render();
}
window.addEventListener('resize', resize);

function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() { document.body.classList.remove('disconnected'); };
  ws.onmessage = function(e) {
    try { handleMsg(JSON.parse(e.data)); } catch (err) { console.error('[Table]', err); }
  };
  ws.onclose = function() { document.body.classList.add('disconnected'); setTimeout(connect, 3000); };
  ws.onerror = function() { document.body.classList.add('disconnected'); };
}

function handleMsg(msg) {
  var t = msg.type || msg.event;
  switch (t) {
    case 'init': {
      var s = msg.state || {};
      if (s.map) {
        mapData = s.map;
        tokens = s.map.tokens || {};
        fogRevealed = s.map.fogRevealed || [];
        loadMapImage();
      }
      if (s.players) players = s.players;
      // Initialize opacities for currently-visible tokens
      for (var id in tokens) initTokenOpacity(id, tokens[id]);
      render();
      break;
    }
    case 'state:change': {
      var p = msg.data && msg.data.path;
      var v = msg.data && msg.data.value;
      if (p === 'map.tokens') { tokens = v || {}; for (var id in tokens) initTokenOpacity(id, tokens[id]); render(); }
      if (p && p.indexOf('map.tokens.') === 0) {
        var parts = p.split('.');
        var tid = parts[2];
        if (parts.length === 3) {
          // Whole token replaced
          var prevVisible = isVisible(tid, tokens[tid]);
          tokens[tid] = v;
          var nowVisible = isVisible(tid, v);
          if (prevVisible !== nowVisible) startTransition(tid, prevVisible ? 1 : 0, nowVisible ? 1 : 0);
        } else if (parts.length > 3) {
          if (!tokens[tid]) tokens[tid] = {};
          var prevVisible2 = isVisible(tid, tokens[tid]);
          tokens[tid][parts[3]] = v;
          var nowVisible2 = isVisible(tid, tokens[tid]);
          if (prevVisible2 !== nowVisible2) startTransition(tid, prevVisible2 ? 1 : 0, nowVisible2 ? 1 : 0);
        }
        render();
      }
      if (p === 'map.fogRevealed') { fogRevealed = v || []; render(); }
      if (p && p.indexOf('players.') === 0) {
        var pidParts = p.split('.');
        var pid = pidParts[1];
        if (!players[pid]) players[pid] = {};
        if (pidParts.length === 2) players[pid] = v;
        else if (pidParts.length === 3) players[pid][pidParts[2]] = v;
        render();
      }
      break;
    }
    case 'map:activated':
    case 'map:full_update': {
      if (msg.data && msg.data.map) {
        mapData = msg.data.map;
        tokens = msg.data.tokens || msg.data.map.tokens || {};
        fogRevealed = msg.data.map.fogRevealed || [];
        loadMapImage();
      }
      for (var id3 in tokens) initTokenOpacity(id3, tokens[id3]);
      render();
      break;
    }
    case 'map:token_moved': {
      var d = msg.data || {};
      if (d.tokenId && tokens[d.tokenId]) {
        tokens[d.tokenId].x = d.x;
        tokens[d.tokenId].y = d.y;
        render();
      }
      break;
    }
    case 'map:token_added': {
      if (msg.data && msg.data.tokenId && msg.data.token) {
        tokens[msg.data.tokenId] = msg.data.token;
        var nowVis = isVisible(msg.data.tokenId, msg.data.token);
        startTransition(msg.data.tokenId, 0, nowVis ? 1 : 0);
        render();
      }
      break;
    }
    case 'map:token_removed': {
      if (msg.data && msg.data.tokenId) {
        // Fade out before delete
        startTransition(msg.data.tokenId, tokenOpacity[msg.data.tokenId] || 0, 0);
        setTimeout(function() {
          if (msg.data && msg.data.tokenId) {
            delete tokens[msg.data.tokenId];
            delete tokenOpacity[msg.data.tokenId];
            render();
          }
        }, 700);
      }
      break;
    }
  }
}

function loadMapImage() {
  if (!mapData || !mapData.image) return;
  var img = new Image();
  img.onload = function() { mapImage = img; centerCamera(); render(); };
  img.onerror = function() { mapImage = null; render(); };
  img.src = '/assets/maps/' + mapData.image;
}

function centerCamera() {
  if (!mapData) return;
  cam.x = 0; cam.y = 0;
  cam.zoom = Math.min(canvas.width / mapData.width, canvas.height / mapData.height) * 0.95;
}

// ═══════════════════════════════════════════════════════════════
// VISIBILITY RULES
// ═══════════════════════════════════════════════════════════════
function isVisible(id, tok) {
  if (!tok) return false;
  // Hidden tokens never visible
  if (tok.hidden) return false;
  // Player tokens always visible — unless absent or not yet arrived
  if (tok.type === 'pc' || tok.isPC) {
    var p = players[id];
    if (p && (p.absent || p.notYetArrived)) return false;
    return true;
  }
  // NPCs only visible if explicitly revealedToPlayers
  return !!tok.revealedToPlayers;
}

function initTokenOpacity(id, tok) {
  tokenOpacity[id] = isVisible(id, tok) ? 1 : 0;
}

function startTransition(id, from, to) {
  if (from === to) return;
  visibilityTransitions[id] = {
    from: from,
    to: to,
    startTime: performance.now(),
    duration: 600
  };
  requestAnimationFrame(animLoop);
}

function animLoop(now) {
  var anyActive = false;
  for (var id in visibilityTransitions) {
    var tr = visibilityTransitions[id];
    var t = Math.min(1, (now - tr.startTime) / tr.duration);
    var eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    tokenOpacity[id] = tr.from + (tr.to - tr.from) * eased;
    if (t >= 1) {
      tokenOpacity[id] = tr.to;
      delete visibilityTransitions[id];
    } else {
      anyActive = true;
    }
  }
  render();
  if (anyActive) requestAnimationFrame(animLoop);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!mapData) return;

  ctx.save();
  ctx.translate(canvas.width / 2 + cam.x * cam.zoom, canvas.height / 2 + cam.y * cam.zoom);
  ctx.scale(cam.zoom, cam.zoom);

  var mw = mapData.width;
  var mh = mapData.height;

  // ── Strict black fog ──
  // Default: entire map blacked out. Only DM-revealed zones show the image.
  if (fogRevealed.length === 0) {
    // No reveal data — entire map is hidden. Players see solid black.
    ctx.restore();
    return;
  }

  // Clip to revealed regions, then draw map image inside the clip
  ctx.save();
  ctx.beginPath();
  for (var fi = 0; fi < fogRevealed.length; fi++) {
    var rect = fogRevealed[fi];
    ctx.rect(rect.x - mw/2, rect.y - mh/2, rect.w, rect.h);
  }
  ctx.clip();

  if (mapImage) {
    ctx.drawImage(mapImage, -mw / 2, -mh / 2, mw, mh);
  }
  ctx.restore();

  // Tokens — strict visibility
  for (var id in tokens) {
    var tok = tokens[id];
    var op = tokenOpacity[id];
    if (op === undefined) {
      tokenOpacity[id] = isVisible(id, tok) ? 1 : 0;
      op = tokenOpacity[id];
    }
    if (op <= 0.001) continue;

    // Token must also be inside a revealed area to render
    var inRevealed = false;
    for (var ri = 0; ri < fogRevealed.length; ri++) {
      var rr = fogRevealed[ri];
      if (tok.x >= rr.x && tok.x <= rr.x + rr.w && tok.y >= rr.y && tok.y <= rr.y + rr.h) {
        inRevealed = true;
        break;
      }
    }
    if (!inRevealed) continue;

    var tx = tok.x - mw / 2;
    var ty = tok.y - mh / 2;
    var gs = mapData.gridSize || 64;
    var r = (gs * 0.4) * 1.4; // 40% larger than dashboard

    ctx.save();
    ctx.globalAlpha = op;

    var isPlayer = tok.type === 'pc' || tok.isPC;
    ctx.fillStyle = tok.color || (isPlayer ? '#5a9ad9' : '#a44');
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(tx, ty, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Label — character name (player) or public name only (NPC)
    var label;
    if (isPlayer) {
      label = (tok.name || id).toUpperCase();
    } else {
      // NPCs: use public-facing name only, never trueIdentity
      label = (tok.publicName || tok.name || id).toUpperCase();
    }
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(label, tx + 1, ty + r + 19);
    ctx.fillStyle = '#e8d0a0';
    ctx.fillText(label, tx, ty + r + 18);

    ctx.restore();
  }

  ctx.restore();
}

connect();
resize();
</script>
</body>
</html>
