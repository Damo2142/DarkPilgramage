<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Dark Pilgrimage — Table</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #000; cursor: none; }
    canvas { display: block; width: 100%; height: 100%; }
    body.disconnected::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      border: 4px solid rgba(170, 30, 20, 0);
      box-sizing: border-box;
      animation: disconnect-pulse 2s ease-in-out infinite;
      z-index: 9999;
    }
    @keyframes disconnect-pulse {
      0%, 100% { border-color: rgba(170, 30, 20, 0.1); }
      50% { border-color: rgba(170, 30, 20, 0.5); }
    }
  </style>
</head>
<body>
<canvas id="map"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
// /table — PLAYER-FACING PROJECTION DISPLAY
// Strict rules:
//   1. Unrevealed fog = SOLID BLACK (zero visibility)
//   2. Player tokens (type:pc) always visible — unless absent/notYetArrived
//   3. NPC tokens visible ONLY if revealedToPlayers === true
//   4. Hidden tokens invisible regardless
//   5. Tokens fade in/out over 600ms when revealedToPlayers toggles
// ═══════════════════════════════════════════════════════════════

var ws = null;
var mapData = null;
var mapImage = null;
var tokens = {};
var fogRevealed = [];
var zones = [];
var players = {};
// Per-token visibility transition: id -> { from, to, startTime, duration }
var visibilityTransitions = {};
// Per-token current opacity (0..1)
var tokenOpacity = {};

// Compute the list of revealed rectangles from either:
//  1) explicit fogRevealed rects, or
//  2) zones[].revealed === true (preferred — matches map system)
// FIX7: NO fallback to entire map. Unrevealed = solid black. Players only
// see rooms their token has physically entered (auto-reveal on entry runs
// in map-service _moveToken). Common-room zone is revealed at session start
// in the map definition. The DM can still manually reveal a zone via the
// dm-map controls panel if they want to skip ahead.
function getRevealedRects() {
  if (fogRevealed && fogRevealed.length) return fogRevealed;
  if (zones && zones.length) {
    var revealed = zones.filter(function(z) { return z && z.revealed === true; });
    if (revealed.length) {
      return revealed.map(function(z) {
        return { x: z.x || 0, y: z.y || 0, w: z.w || z.width || 0, h: z.h || z.height || 0 };
      });
    }
  }
  return [];
}

var cam = { x: 0, y: 0, zoom: 1 };
var canvas = document.getElementById('map');
var ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  centerCamera();
  render();
}
window.addEventListener('resize', resize);

function connect() {
  // PHASE 4B — single WS per page
  if (window._wsInitialized && ws && (ws.readyState === 0 || ws.readyState === 1)) return;
  window._wsInitialized = true;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() { document.body.classList.remove('disconnected'); };
  ws.onmessage = function(e) {
    try { handleMsg(JSON.parse(e.data)); } catch (err) { console.error('[Table]', err); }
  };
  ws.onclose = function() { document.body.classList.add('disconnected'); window._wsInitialized = false; setTimeout(connect, 3000); };
  ws.onerror = function() { document.body.classList.add('disconnected'); };
}

// PHASE 7D — token speaking pulse state
var speakingTokens = {}; // tokenId -> { until, color }
var SPEAK_COLORS = {
  'hooded-stranger': '#c0c8d0',  // Vladislav — cold silver-white, subtly wrong
  'vladislav':       '#c0c8d0',
  'tomas':           '#e07020',  // Tomas — agitated amber
  'piotr':           '#aa2010',  // Piotr — dim red
  'pc':              '#5a9ad9',  // player tokens — blue
  'default':         '#e89040'   // living NPCs — warm amber
};
function _speakColor(tokenId, tok) {
  if (tok && (tok.type === 'pc' || tok.isPC)) return SPEAK_COLORS.pc;
  return SPEAK_COLORS[tokenId] || SPEAK_COLORS[tok && tok.actorSlug] || SPEAK_COLORS.default;
}
function startTokenPulse(tokenId, durationMs) {
  if (!tokenId) return;
  var tok = tokens[tokenId] || tokens[Object.keys(tokens).find(function(k){return tokens[k] && tokens[k].actorSlug===tokenId;})];
  speakingTokens[tokenId] = { until: Date.now() + (durationMs || 2000), color: _speakColor(tokenId, tok), startedAt: Date.now() };
  if (!_pulseAnim) _pulseAnim = requestAnimationFrame(_pulseLoop);
}
var _pulseAnim = null;
function _pulseLoop() {
  var now = Date.now();
  var any = false;
  for (var tid in speakingTokens) {
    if (speakingTokens[tid].until > now) any = true;
    else delete speakingTokens[tid];
  }
  render();
  if (any) _pulseAnim = requestAnimationFrame(_pulseLoop);
  else _pulseAnim = null;
}

function handleMsg(msg) {
  var t = msg.type || msg.event;
  // PHASE 7D — token speaking pulse
  if (t === 'token:speaking') {
    var d = msg.data || {};
    if (d.tokenId) startTokenPulse(d.tokenId, d.durationMs);
    return;
  }
  switch (t) {
    case 'init': {
      var s = msg.state || {};
      if (s.map) {
        mapData = s.map;
        tokens = s.map.tokens || {};
        fogRevealed = s.map.fogRevealed || [];
        zones = s.map.zones || [];
        loadMapImage();
      }
      if (s.players) players = s.players;
      // Initialize opacities for currently-visible tokens
      for (var id in tokens) initTokenOpacity(id, tokens[id]);
      render();
      break;
    }
    case 'state:change': {
      var p = msg.data && msg.data.path;
      var v = msg.data && msg.data.value;
      if (p === 'map.tokens') { tokens = v || {}; for (var id in tokens) initTokenOpacity(id, tokens[id]); render(); }
      if (p && p.indexOf('map.tokens.') === 0) {
        var parts = p.split('.');
        var tid = parts[2];
        if (parts.length === 3) {
          // Whole token replaced
          var prevVisible = isVisible(tid, tokens[tid]);
          tokens[tid] = v;
          var nowVisible = isVisible(tid, v);
          if (prevVisible !== nowVisible) startTransition(tid, prevVisible ? 1 : 0, nowVisible ? 1 : 0);
        } else if (parts.length > 3) {
          if (!tokens[tid]) tokens[tid] = {};
          var prevVisible2 = isVisible(tid, tokens[tid]);
          tokens[tid][parts[3]] = v;
          var nowVisible2 = isVisible(tid, tokens[tid]);
          if (prevVisible2 !== nowVisible2) startTransition(tid, prevVisible2 ? 1 : 0, nowVisible2 ? 1 : 0);
        }
        render();
      }
      if (p === 'map.fogRevealed') { fogRevealed = v || []; render(); }
      if (p === 'map.zones') { zones = v || []; render(); }
      if (p && p.indexOf('map.zones.') === 0) {
        // Re-fetch zones from state
        zones = (stateData && stateData.map && stateData.map.zones) || zones;
        render();
      }
      if (p && p.indexOf('players.') === 0) {
        var pidParts = p.split('.');
        var pid = pidParts[1];
        if (!players[pid]) players[pid] = {};
        if (pidParts.length === 2) players[pid] = v;
        else if (pidParts.length === 3) players[pid][pidParts[2]] = v;
        render();
      }
      break;
    }
    case 'map:activated':
    case 'map:full_update': {
      if (msg.data && msg.data.map) {
        mapData = msg.data.map;
        tokens = msg.data.tokens || msg.data.map.tokens || {};
        fogRevealed = msg.data.map.fogRevealed || [];
        zones = msg.data.map.zones || [];
        loadMapImage();
      }
      for (var id3 in tokens) initTokenOpacity(id3, tokens[id3]);
      render();
      break;
    }
    case 'map:zone_revealed':
    case 'map:zones_all_revealed': {
      // Refresh zones from message
      if (msg.data && msg.data.zoneId !== undefined) {
        for (var zi = 0; zi < zones.length; zi++) {
          if (zones[zi].id === msg.data.zoneId) {
            zones[zi].revealed = !!msg.data.revealed;
            break;
          }
        }
      } else {
        zones.forEach(function(z) { z.revealed = msg.data && msg.data.revealed !== false; });
      }
      render();
      break;
    }
    case 'map:token_moved': {
      var d = msg.data || {};
      if (d.tokenId && tokens[d.tokenId]) {
        tokens[d.tokenId].x = d.x;
        tokens[d.tokenId].y = d.y;
        render();
      }
      break;
    }
    case 'map:token_added': {
      if (msg.data && msg.data.tokenId && msg.data.token) {
        tokens[msg.data.tokenId] = msg.data.token;
        var nowVis = isVisible(msg.data.tokenId, msg.data.token);
        startTransition(msg.data.tokenId, 0, nowVis ? 1 : 0);
        render();
      }
      break;
    }
    case 'map:token_removed': {
      if (msg.data && msg.data.tokenId) {
        // Fade out before delete
        startTransition(msg.data.tokenId, tokenOpacity[msg.data.tokenId] || 0, 0);
        setTimeout(function() {
          if (msg.data && msg.data.tokenId) {
            delete tokens[msg.data.tokenId];
            delete tokenOpacity[msg.data.tokenId];
            render();
          }
        }, 700);
      }
      break;
    }
  }
}

function loadMapImage() {
  if (!mapData || !mapData.image) return;
  var img = new Image();
  img.onload = function() { mapImage = img; centerCamera(); render(); };
  img.onerror = function() { mapImage = null; render(); };
  img.src = '/assets/maps/' + mapData.image;
}

function centerCamera() {
  if (!mapData) return;
  cam.x = 0; cam.y = 0;
  cam.zoom = Math.min(canvas.width / mapData.width, canvas.height / mapData.height) * 0.95;
}

// ═══════════════════════════════════════════════════════════════
// VISIBILITY RULES
// ═══════════════════════════════════════════════════════════════
function isVisible(id, tok) {
  if (!tok) return false;
  // Hidden tokens never visible
  if (tok.hidden) return false;
  // Player tokens always visible — unless absent or not yet arrived
  if (tok.type === 'pc' || tok.isPC) {
    var p = players[id];
    if (p && (p.absent || p.notYetArrived)) return false;
    return true;
  }
  // NPCs only visible if explicitly revealedToPlayers
  return !!tok.revealedToPlayers;
}

// Name visibility — strict default OFF for everyone.
// Player tokens: name shown only if tok.nameRevealedToPlayers === true
// NPC tokens: shown only if tok.nameRevealedToPlayers === true AND tok.publicName is set
// Default: anonymous circles, no labels.
function getDisplayName(id, tok) {
  if (!tok || !tok.nameRevealedToPlayers) return null;
  if (tok.type === 'pc' || tok.isPC) return tok.name || null;
  // NPC: use publicName only, never trueIdentity / true name
  return tok.publicName || null;
}

function initTokenOpacity(id, tok) {
  tokenOpacity[id] = isVisible(id, tok) ? 1 : 0;
}

function startTransition(id, from, to) {
  if (from === to) return;
  visibilityTransitions[id] = {
    from: from,
    to: to,
    startTime: performance.now(),
    duration: 600
  };
  requestAnimationFrame(animLoop);
}

function animLoop(now) {
  var anyActive = false;
  for (var id in visibilityTransitions) {
    var tr = visibilityTransitions[id];
    var t = Math.min(1, (now - tr.startTime) / tr.duration);
    var eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    tokenOpacity[id] = tr.from + (tr.to - tr.from) * eased;
    if (t >= 1) {
      tokenOpacity[id] = tr.to;
      delete visibilityTransitions[id];
    } else {
      anyActive = true;
    }
  }
  render();
  if (anyActive) requestAnimationFrame(animLoop);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// Layer order:
//   1. Solid black background (covers everything outside map)
//   2. Map image — but only INSIDE revealed rects (clip)
//   3. Tokens — only those inside a revealed rect
//   4. (No black overlay needed — outside revealed = never drawn = black)
// ═══════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!mapData) return;

  ctx.save();
  ctx.translate(canvas.width / 2 + cam.x * cam.zoom, canvas.height / 2 + cam.y * cam.zoom);
  ctx.scale(cam.zoom, cam.zoom);

  var mw = mapData.width;
  var mh = mapData.height;
  var gs = mapData.gridSize || 64;
  var revealedRects = getRevealedRects();

  // ── Layer 1: map image — draw ONLY the parts inside revealed rects ──
  // FIX-B2 — use per-rect source-region drawImage instead of canvas clip().
  // Clip can leak in some browsers when the clip path covers a sub-rect of
  // the image; per-rect drawImage(src..., dst...) is impossible to bypass.
  // Each revealed rect crops a sub-region of the source image and draws it
  // at the matching destination coordinates.
  if (revealedRects.length > 0 && mapImage) {
    for (var fi = 0; fi < revealedRects.length; fi++) {
      var rect = revealedRects[fi];
      // Clamp the rect to the map bounds in case zone coords go out of range
      var sx = Math.max(0, rect.x);
      var sy = Math.max(0, rect.y);
      var sw = Math.min(mw - sx, rect.w);
      var sh = Math.min(mh - sy, rect.h);
      if (sw <= 0 || sh <= 0) continue;
      var dx = sx - mw/2;
      var dy = sy - mh/2;
      ctx.drawImage(mapImage, sx, sy, sw, sh, dx, dy, sw, sh);
    }
  }

  // ── Layer 2: tokens — only those inside a revealed area ──
  if (revealedRects.length > 0) {
    for (var id in tokens) {
      var tok = tokens[id];
      if (!tok) continue;
      var op = tokenOpacity[id];
      if (op === undefined) {
        tokenOpacity[id] = isVisible(id, tok) ? 1 : 0;
        op = tokenOpacity[id];
      }
      if (op <= 0.001) continue;

      // Token must be inside a revealed area
      var inRevealed = false;
      for (var ri = 0; ri < revealedRects.length; ri++) {
        var rr = revealedRects[ri];
        if (tok.x >= rr.x && tok.x <= rr.x + rr.w && tok.y >= rr.y && tok.y <= rr.y + rr.h) {
          inRevealed = true;
          break;
        }
      }
      if (!inRevealed) continue;

      var tx = tok.x - mw / 2;
      var ty = tok.y - mh / 2;
      var r = (gs * 0.4) * 1.4; // 40% larger than dashboard

      ctx.save();
      ctx.globalAlpha = op;

      var isPlayer = tok.type === 'pc' || tok.isPC;

      // PHASE 7D — speaking pulse halo
      var sp = speakingTokens[id] || speakingTokens[tok.actorSlug];
      if (sp && sp.until > Date.now()) {
        var elapsed = Date.now() - sp.startedAt;
        // Tomas has irregular rhythm; everyone else is smooth sine
        var freqHz = (id === 'tomas' || tok.actorSlug === 'tomas') ? (1.6 + Math.sin(elapsed * 0.013) * 0.6) : 1.25;
        var phase = (elapsed / 1000) * freqHz * Math.PI * 2;
        var pulseAmp = (Math.sin(phase) + 1) / 2; // 0..1
        var haloR = r * (1.5 + pulseAmp * 0.6);
        var alpha = 0.25 + pulseAmp * 0.4;
        ctx.save();
        ctx.globalAlpha = alpha * op;
        ctx.strokeStyle = sp.color;
        ctx.lineWidth = 6 + pulseAmp * 4;
        ctx.beginPath();
        ctx.arc(tx, ty, haloR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = tok.color || (isPlayer ? '#5a9ad9' : '#a44');
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(tx, ty, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Label — strict: only if name is explicitly revealed
      var label = getDisplayName(id, tok);
      if (label) {
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#000';
        ctx.fillText(label.toUpperCase(), tx + 1, ty + r + 19);
        ctx.fillStyle = '#e8d0a0';
        ctx.fillText(label.toUpperCase(), tx, ty + r + 18);
      }

      ctx.restore();
    }
  }

  ctx.restore();
}

connect();
resize();
</script>
</body>
</html>
