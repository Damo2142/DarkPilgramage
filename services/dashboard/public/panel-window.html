<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <link rel="stylesheet" href="/panel-styles.css">
  <style>
    html, body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .panel-content { flex: 1; overflow-y: auto; padding: 12px; }
    .panel-content.no-pad { padding: 0; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 14px; }
    /* HAL panel specific */
    .hal-log { flex: 1; overflow-y: auto; padding: 8px; }
    .hal-entry { margin-bottom: 10px; }
    .hal-query { color: var(--accent); font-size: 12px; margin-bottom: 3px; }
    .hal-query .hal-time { color: var(--text-dim); font-size: 10px; margin-right: 6px; }
    .hal-response { color: #a0c8e8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; padding-left: 12px; border-left: 2px solid var(--border-light); line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .hal-input-row { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--border); }
    .hal-input-row input { flex: 1; }
    /* Combat specific */
    .combat-current { background: var(--accent-glow); border: 2px solid var(--accent); border-radius: 6px; padding: 10px 14px; margin-bottom: 10px; }
    .combat-current .cc-name { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .combat-current .cc-round { font-size: 12px; color: var(--text-dim); }
    .combat-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .combat-row:hover { background: var(--surface2); }
    .combat-row.active { background: rgba(201,165,78,0.08); border-left: 3px solid var(--accent); }
    .combat-row.dead { opacity: 0.4; text-decoration: line-through; }
    .cr-init { font-family: monospace; font-size: 14px; font-weight: 700; color: var(--accent); min-width: 28px; text-align: center; }
    .cr-name { flex: 1; font-size: 13px; }
    .cr-name.pc { color: var(--blue); }
    .cr-name.npc { color: var(--red-bright); }
    .cr-hp { font-family: monospace; font-size: 12px; }
    .cr-hp-bar { width: 60px; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .cr-hp-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .combat-cond { font-size: 9px; padding: 1px 5px; background: var(--surface3); border-radius: 3px; color: var(--text-dim); }
    /* Wound dots */
    .wound-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #555; cursor: pointer; }
    .wound-dot:hover { border-color: var(--accent); }
    /* Player card */
    .player-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
    .player-card .pc-cam { width: 120px; height: 90px; border-radius: 4px; border: 1px solid var(--border); background: #111; object-fit: cover; flex-shrink: 0; }
    .player-card .pc-cam-placeholder { width: 120px; height: 90px; border-radius: 4px; border: 1px solid var(--border); background: #111; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 24px; opacity: 0.3; }
    .player-card .pc-info { flex: 1; min-width: 0; }
    .player-card .pc-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--text); }
    .player-card .pc-char { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .player-card .pc-status { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; }
    .online-dot.on { background: var(--green); }
    .online-dot.off { background: var(--red); }
    /* Equipment pips */
    .eq-pip { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .eq-pip-0 { background: #4caf50; } .eq-pip-1 { background: #8bc34a; } .eq-pip-2 { background: #ffc107; } .eq-pip-3 { background: #ff5722; } .eq-pip-4 { background: #666; }
    /* Stamina torch */
    .stam-torch { display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; font-size: 16px; cursor: pointer; }
    /* Shock save buttons */
    .shock-btns { display: flex; gap: 6px; margin-top: 8px; }
    .shock-btns button { flex: 1; min-height: 40px; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <!-- Popout chrome bar -->
  <div class="popout-chrome">
    <span class="popout-title" id="panel-title">Panel</span>
    <button class="dock-btn" onclick="dockBack()">Dock Back</button>
  </div>

  <!-- Panel content area -->
  <div class="panel-content" id="panel-content">
    <div id="loading">Connecting...</div>
  </div>

<script src="/panel-framework.js"></script>
<script>
  // ═══════════════════════════════════════════════════════════════
  // PANEL IDENTIFICATION
  // ═══════════════════════════════════════════════════════════════
  const PANEL_ID = location.pathname.split('/panel/')[1] || 'panel-unknown';
  const PANEL_INFO = PanelRegistry.get(PANEL_ID);

  if (PANEL_INFO) {
    document.title = `${PANEL_INFO.title} — Co-DM`;
    $('panel-title').textContent = `${PANEL_INFO.icon} ${PANEL_INFO.title}`;
  }

  function dockBack() {
    // Notify opener if available
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({ type: 'panel:dock', panelId: PANEL_ID }, '*');
      } catch(e) {}
    }
    window.close();
  }

  // ═══════════════════════════════════════════════════════════════
  // PANEL RENDERERS
  // ═══════════════════════════════════════════════════════════════

  const PanelRenderers = {
    // ── HAL ────────────────────────────────────────────────────
    'panel-hal': {
      _entries: [],
      init(container) {
        container.classList.add('no-pad');
        container.style.cssText = 'display:flex;flex-direction:column;padding:0;';
        container.innerHTML = `
          <div class="hal-log" id="hal-log"></div>
          <div class="hal-input-row">
            <input type="text" id="hal-input" placeholder="Ask HAL..." onkeydown="if(event.key==='Enter')halSend()">
            <button onclick="halSend()">Ask</button>
            <button class="sm ghost" onclick="halClear()" title="Clear history">Clear</button>
          </div>`;
        // Load history
        fetch('/api/hal/history').then(r=>r.json()).then(d=>{
          if(d.history){this._entries=d.history;this.render();}
        }).catch(()=>{});
      },
      onEvent(msg) {
        if(msg.type==='hal:response'&&msg.data){
          this._entries.push(msg.data);
          if(this._entries.length>50)this._entries.shift();
          this.render();
        }
      },
      render() {
        const log=$('hal-log');
        if(!log)return;
        log.innerHTML=this._entries.map(e=>{
          const time=new Date(e.timestamp).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
          const src=e.source==='voice'?'&#127908;':'&#9000;';
          return `<div class="hal-entry">
            <div class="hal-query">${src} <span class="hal-time">${time}</span>${esc(e.query)}</div>
            <div class="hal-response">${esc(e.response)}</div>
          </div>`;
        }).join('');
        log.scrollTop=log.scrollHeight;
      }
    },

    // ── COMBAT ─────────────────────────────────────────────────
    'panel-combat': {
      _combat: null,
      init(container) {
        container.innerHTML = '<div id="combat-content" style="color:var(--text-dim);">Waiting for combat data...</div>';
      },
      onEvent(msg) {
        const t = msg.type || msg.event;
        if(t==='init') {
          this._combat = DashWS.state?.combat;
          this.render();
        }
        if(t.startsWith('combat:')) {
          this._combat = msg.data?.combat || DashWS.state?.combat || this._combat;
          this.render();
        }
      },
      render() {
        const el=$('combat-content');
        if(!el)return;
        const c=this._combat;
        if(!c||!c.active){
          el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-dim);">No active combat<br><button class="primary" style="margin-top:12px;" onclick="DashWS.send(\'combat:start_all\')">Start Combat</button></div>';
          return;
        }
        const cur=c.turnOrder[c.currentTurn];
        let html=`<div class="combat-current">
          <div class="cc-round">Round ${c.round}</div>
          <div class="cc-name">${cur?esc(cur.name):'—'}</div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:10px;">
          <button class="sm" onclick="fetch('/api/combat/prev',{method:'POST'})">&#9664; Prev</button>
          <button class="sm primary" onclick="fetch('/api/combat/next',{method:'POST'})" style="flex:1;">Next Turn &#9654;</button>
          <button class="sm danger" onclick="if(confirm('End combat?'))fetch('/api/combat/end',{method:'POST'})">End</button>
        </div>`;

        html+=(c.turnOrder||[]).map((x,i)=>{
          const active=i===c.currentTurn;
          const dead=!x.isAlive;
          const hpPct=x.hp.max>0?Math.round(x.hp.current/x.hp.max*100):0;
          const hpColor=hpPct<=0?'var(--red-bright)':hpPct<=25?'var(--red)':hpPct<=50?'var(--orange)':'var(--green)';
          const conds=(x.conditions||[]).map(cn=>`<span class="combat-cond">${cn}</span>`).join(' ');
          const bleeding=x._bleeding&&x._bleeding.length?`<div style="color:var(--red-bright);font-size:11px;margin-top:4px;">Bleeding: ${x._bleeding.join(', ')} <button class="sm" style="font-size:9px;padding:1px 6px;min-height:unset;" onclick="fetch('/api/combat/stop-bleeding',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({combatantId:'${x.id}'})})">Stop</button></div>`:'';
          const shocked=(x.conditions||[]).includes('shocked')?`<div style="color:var(--orange);font-size:11px;margin-top:4px;">SHOCKED (${x._shockRoundsLeft||'?'} rds) <button class="sm" style="font-size:9px;padding:1px 6px;min-height:unset;" onclick="fetch('/api/combat/rouse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({combatantId:'${x.id}'})})">Rouse</button></div>`:'';
          return `<div class="combat-row${active?' active':''}${dead?' dead':''}">
            <span class="cr-init">${x.initiative}</span>
            <div style="flex:1;min-width:0;">
              <div class="cr-name ${x.type}">${esc(x.name)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
                <span class="cr-hp" style="color:${hpColor}">${x.hp.current}/${x.hp.max}</span>
                <span class="cr-hp-bar"><span class="cr-hp-fill" style="width:${hpPct}%;background:${hpColor}"></span></span>
              </div>
              ${conds?'<div style="margin-top:3px;">'+conds+'</div>':''}
              ${bleeding}${shocked}
            </div>
          </div>`;
        }).join('');

        // Shock save buttons (visible when massive damage event is pending)
        html+=`<div class="shock-btns" id="shock-btns" style="display:none;">
          <button class="primary" id="shock-pass-btn">Shock Save: PASS</button>
          <button class="danger" id="shock-fail-btn">Shock Save: FAIL</button>
        </div>`;

        el.innerHTML=html;
      }
    },

    // ── WOUNDS ─────────────────────────────────────────────────
    'panel-wounds': {
      _wounds: {},
      _stamina: {},
      _cameras: {},
      init(container) {
        container.innerHTML='<div id="wounds-content" style="color:var(--text-dim);">Loading...</div>';
      },
      onEvent(msg) {
        const t=msg.type||msg.event;
        if(t==='init'){
          const players=DashWS.state?.players||{};
          for(const[pid,p]of Object.entries(players)){
            if(p.wounds)this._wounds[pid]=p.wounds;
            if(p.stamina)this._stamina[pid]=p.stamina;
          }
          this.render();
        }
        if(t==='wounds:updated'&&msg.data){
          this._wounds[msg.data.playerId]=msg.data.wounds;
          this.render();
        }
        if((t==='stamina:updated'||t==='stamina:tier_change')&&msg.data){
          this._stamina[msg.data.playerId]=msg.data;
          this.render();
        }
        if(t==='player:camera_frame'&&msg.playerId){
          this._cameras[msg.playerId]=msg.frame;
          const img=$('cam-'+msg.playerId);
          if(img&&img.tagName==='IMG')img.src=msg.frame;
        }
      },
      render() {
        const el=$('wounds-content');
        if(!el)return;
        const players=DashWS.state?.players||{};
        const ids=Object.keys(players).filter(id=>players[id]?.character);
        if(!ids.length){el.innerHTML='<span class="text-dim">No players loaded.</span>';return;}

        const LIMBS=['head','torso','leftArm','rightArm','leftLeg','rightLeg'];
        const SHORT={head:'Hd',torso:'To',leftArm:'LA',rightArm:'RA',leftLeg:'LL',rightLeg:'RL'};
        const COLORS=['#1a3a1a','#4a6a20','#a08020','#a04020','#602020'];
        const NAMES=['Unharmed','Scratched','Wounded','Broken','Crippled'];

        el.innerHTML=ids.map(pid=>{
          const name=players[pid]?.character?.name||pid;
          const w=this._wounds[pid]||{head:0,torso:0,leftArm:0,rightArm:0,leftLeg:0,rightLeg:0};
          const stam=this._stamina[pid];
          const cam=this._cameras[pid];

          const dots=LIMBS.map(limb=>{
            const s=w[limb]||0;
            return `<span class="wound-dot" title="${SHORT[limb]}: ${NAMES[s]}" style="background:${COLORS[s]}"></span>`;
          }).join(' ');

          // Torch icon
          let torch='<span class="stam-torch" title="No data" style="opacity:0.3;">&#128367;</span>';
          if(stam){
            const icons={fresh:{e:'&#128293;',t:'Fresh',o:'1'},winded:{e:'&#128293;',t:'Winded',o:'0.7'},exhausted:{e:'&#128293;',t:'Exhausted',o:'0.5'},spent:{e:'&#128293;',t:'Spent',o:'0.3'},collapsed:{e:'&#128367;',t:'Collapsed',o:'0.3'}};
            const s=icons[stam.state]||icons.fresh;
            torch=`<span class="stam-torch" title="${s.t}" style="opacity:${s.o}">${s.e}</span>`;
          }

          // Camera
          const camHtml=cam
            ?`<img id="cam-${pid}" src="${cam}" class="pc-cam" style="width:120px;height:90px;border-radius:4px;border:1px solid var(--border);object-fit:cover;">`
            :`<div class="pc-cam-placeholder" id="cam-${pid}">&#128100;</div>`;

          return `<div class="player-card" style="margin-bottom:8px;">
            ${camHtml}
            <div class="pc-info">
              <div style="display:flex;align-items:center;gap:6px;">
                ${torch}
                <span class="pc-name">${esc(name)}</span>
              </div>
              <div style="display:flex;gap:4px;margin-top:6px;">${dots}</div>
            </div>
          </div>`;
        }).join('');
      }
    },

    // ── PLAYERS ────────────────────────────────────────────────
    'panel-players': {
      _cameras: {},
      init(container) {
        container.innerHTML='<div id="players-content" style="color:var(--text-dim);">Loading...</div>';
      },
      onEvent(msg) {
        const t=msg.type||msg.event;
        if(t==='init'||t==='characters:reloaded'||t==='player:connected'||t==='player:disconnected')this.render();
        if(t==='player:camera_frame'&&msg.playerId){
          this._cameras[msg.playerId]=msg.frame;
          const img=$('pcam-'+msg.playerId);
          if(img&&img.tagName==='IMG')img.src=msg.frame;
        }
      },
      render() {
        const el=$('players-content');
        if(!el)return;
        const players=DashWS.state?.players||{};
        const ids=Object.keys(players);
        if(!ids.length){el.innerHTML='<div class="text-dim">No players.</div>';return;}
        el.innerHTML=ids.map(pid=>{
          const p=players[pid]||{};
          const c=p.character;
          const cam=this._cameras[pid];
          const connected=p.connected;
          const camHtml=cam
            ?`<img id="pcam-${pid}" src="${cam}" class="pc-cam">`
            :`<div class="pc-cam-placeholder" id="pcam-${pid}">&#128100;</div>`;
          return `<div class="player-card" style="margin-bottom:8px;">
            ${camHtml}
            <div class="pc-info">
              <div class="pc-name">${esc(pid)}</div>
              <div class="pc-char">${c?esc(c.name)+' — '+esc(c.race)+' '+esc(c.class)+' '+c.level:'No character assigned'}</div>
              <div class="pc-status">
                <span class="online-dot ${connected?'on':'off'}"></span>
                <span style="font-size:11px;color:var(--text-dim);">${connected?'Online':'Offline'}</span>
              </div>
            </div>
          </div>`;
        }).join('');
      }
    },

    // ── EQUIPMENT ──────────────────────────────────────────────
    'panel-equipment': {
      _cache: {},
      init(container) {
        container.innerHTML='<div id="equip-content" style="color:var(--text-dim);">Loading...</div>';
        this.refresh();
      },
      onEvent(msg) {
        if(msg.type==='equipment:updated'||msg.type==='equipment:degraded'||msg.type==='init')this.refresh();
      },
      refresh() {
        const players=DashWS.state?.players||{};
        const ids=Object.keys(players).filter(id=>players[id]?.character);
        if(!ids.length)return;
        Promise.all(ids.map(id=>fetch('/api/equipment/'+id).then(r=>r.json()).then(d=>({id,data:d})).catch(()=>null)))
          .then(results=>{
            for(const r of results)if(r)this._cache[r.id]=r.data;
            this.render();
          });
      },
      render() {
        const el=$('equip-content');
        if(!el)return;
        const players=DashWS.state?.players||{};
        const labels=['Pristine','Good','Worn','Damaged','Broken'];
        let html='';
        for(const[pid,eq]of Object.entries(this._cache)){
          const name=players[pid]?.character?.name||pid;
          html+=`<div style="margin-bottom:10px;"><div style="font-family:Cinzel,serif;font-size:13px;color:var(--accent);margin-bottom:4px;">${esc(name)}</div>`;
          for(const[item,cond]of Object.entries(eq.conditions||{})){
            html+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;${cond===4?'text-decoration:line-through;color:#666;':''}">
              <span class="eq-pip eq-pip-${cond}"></span>
              <span style="flex:1;font-size:12px;">${esc(item)}</span>
              <span class="text-dim text-sm">${labels[cond]}</span>
            </div>`;
          }
          for(const[type,info]of Object.entries(eq.ammo||{})){
            html+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;">
              <span style="font-weight:700;color:${info.count<=3?'var(--red-bright)':'var(--accent)'};min-width:20px;text-align:right;">${info.count}</span>
              <span style="font-size:12px;">${type}</span>
            </div>`;
          }
          if(eq.healerKit){
            const pct=(eq.healerKit.charges/eq.healerKit.max)*100;
            html+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;">
              <span style="font-size:12px;">Kit:</span>
              <div style="flex:1;height:5px;background:#222;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${pct<=20?'var(--red-bright)':'var(--green)'}"></div></div>
              <span class="text-dim text-sm">${eq.healerKit.charges}</span>
            </div>`;
          }
          html+='</div>';
        }
        el.innerHTML=html||'<span class="text-dim">No equipment tracked</span>';
      }
    },

    // ── SESSION ────────────────────────────────────────────────
    'panel-session': {
      init(container) {
        container.innerHTML=`
          <div class="flex-col">
            <div class="flex-row" style="flex-wrap:wrap;">
              <button class="primary" onclick="DashWS.send('session:start')">&#9654; Start</button>
              <button onclick="DashWS.send('session:pause')">&#9208; Pause</button>
              <button onclick="DashWS.send('session:resume')">&#9654; Resume</button>
              <button onclick="DashWS.send('session:end')">&#9209; End</button>
            </div>
            <div class="flex-row" style="flex-wrap:wrap;">
              <button onclick="fetch('/api/session/resume',{method:'POST'})">Resume Save</button>
              <button class="danger" onclick="if(confirm('Reset?'))fetch('/api/session/reset',{method:'POST'})">Reset</button>
            </div>
            <button class="danger" onclick="if(confirm('PANIC?'))DashWS.send('panic')" style="margin-top:8px;">PANIC</button>
            <button onclick="fetch('/api/recap',{method:'POST'})" style="margin-top:8px;">Recap (AI Summary)</button>
          </div>`;
      },
      onEvent() {}
    },

    // ── ATMOSPHERE ─────────────────────────────────────────────
    'panel-atmosphere': {
      init(container) {
        container.innerHTML='<div id="atmo-content" style="color:var(--text-dim);">Loading atmosphere profiles...</div>';
        this.render();
      },
      onEvent(msg) {
        if(msg.type==='atmo:profile_active'||msg.type==='init')this.render();
      },
      render() {
        const el=$('atmo-content');
        if(!el)return;
        const profiles=['tavern_warm','tavern_tense','tavern_dark','investigation','dread_rising','terror_peak','combat','revelation','dawn'];
        const current=DashWS.state?.atmosphere?.currentProfile||'';
        el.innerHTML=profiles.map(p=>{
          const active=p===current;
          return `<button style="display:block;width:100%;text-align:left;margin-bottom:4px;${active?'border-color:var(--accent);background:var(--accent-glow);':''}" onclick="fetch('/api/atmosphere/${p}',{method:'POST'})">${active?'&#9654; ':''}${p.replace(/_/g,' ')}</button>`;
        }).join('');
      }
    },

    // ── SPURT ──────────────────────────────────────────────────
    'panel-spurt': {
      init(container) {
        container.innerHTML=`
          <div class="flex-col">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">Spurt the Kobold Wild Magic Sorcerer</div>
            <div class="flex-row" style="flex-wrap:wrap;">
              <button onclick="DashWS.send('spurt:speak',{type:'dialogue'})">Make Spurt Talk</button>
              <button onclick="DashWS.send('spurt:wild_surge')">Wild Magic Surge</button>
            </div>
            <input type="text" id="spurt-prompt" placeholder="Tell Spurt to..." style="margin-top:8px;" onkeydown="if(event.key==='Enter'){DashWS.send('spurt:speak',{prompt:this.value,type:'dialogue'});this.value='';}">
            <div id="spurt-log" style="margin-top:8px;max-height:200px;overflow-y:auto;font-size:12px;"></div>
          </div>`;
      },
      onEvent(msg) {
        const t=msg.type||msg.event;
        if(t==='spurt:dialogue'||t==='spurt:combat_action'||t==='spurt:surge_result'){
          const log=$('spurt-log');
          if(!log)return;
          const text=msg.data?.text||msg.data?.dialogue||msg.data?.effect||JSON.stringify(msg.data);
          log.innerHTML=`<div style="padding:4px 0;border-bottom:1px solid var(--border);"><span style="color:var(--accent);">Spurt:</span> ${esc(text)}</div>`+log.innerHTML;
        }
      }
    },

    // ── NPC QUEUE ──────────────────────────────────────────────
    'panel-npc-queue': {
      _queue: [],
      init(container) {
        container.innerHTML='<div id="npc-queue-content" style="color:var(--text-dim);">No pending NPC dialogue.</div>';
      },
      onEvent(msg) {
        if(msg.type==='ai:npc_dialogue'&&msg.data){
          this._queue.push(msg.data);
          this.render();
        }
      },
      render() {
        const el=$('npc-queue-content');
        if(!el)return;
        if(!this._queue.length){el.innerHTML='<div class="text-dim">No pending NPC dialogue.</div>';return;}
        el.innerHTML=this._queue.map(d=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;">
          <div style="font-weight:600;color:var(--accent);margin-bottom:4px;">${esc(d.npc)}</div>
          <div style="font-size:12px;margin-bottom:6px;font-style:italic;">${esc(d.text)}</div>
          <div class="flex-row gap-sm">
            <button class="sm primary" onclick="DashWS.send('npc:approve',{id:'${d.id}'});this.closest('div[style]').remove();">Approve</button>
            <button class="sm danger" onclick="DashWS.send('npc:reject',{id:'${d.id}'});this.closest('div[style]').remove();">Reject</button>
          </div>
        </div>`).join('');
      }
    },

    // ── CAMERAS ────────────────────────────────────────────────
    'panel-cameras': {
      _frames: {},
      init(container) {
        container.innerHTML='<div id="cameras-content" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;"></div>';
      },
      onEvent(msg) {
        if(msg.type==='player:camera_frame'&&msg.playerId){
          this._frames[msg.playerId]=msg.frame;
          this.render();
        }
        if(msg.type==='init')this.render();
      },
      render() {
        const el=$('cameras-content');
        if(!el)return;
        const players=DashWS.state?.players||{};
        const ids=Object.keys(players);
        el.innerHTML=ids.map(pid=>{
          const name=players[pid]?.character?.name||pid;
          const frame=this._frames[pid];
          return `<div style="text-align:center;">
            ${frame?`<img src="${frame}" style="width:100%;border-radius:4px;border:1px solid var(--border);">`:`<div style="width:100%;aspect-ratio:4/3;background:#111;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0.3;">&#128100;</div>`}
            <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">${esc(name)}</div>
          </div>`;
        }).join('');
      }
    },

    // ── DREAD ──────────────────────────────────────────────────
    'panel-dread': {
      init(container) {
        container.innerHTML='<div id="dread-content"></div>';
      },
      onEvent(msg) {
        if(msg.type==='init'||msg.type==='dread:update')this.render();
      },
      render() {
        const el=$('dread-content');
        if(!el)return;
        const players=DashWS.state?.players||{};
        el.innerHTML=Object.entries(players).map(([pid,p])=>{
          const name=p.character?.name||pid;
          const score=p.dread?.score||0;
          const color=score>=80?'var(--red-bright)':score>=60?'var(--orange)':score>=40?'var(--accent)':'var(--text-dim)';
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="min-width:80px;font-size:12px;">${esc(name)}</span>
            <div style="flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${score}%;background:${color};border-radius:3px;transition:width 0.3s;"></div></div>
            <span style="font-family:monospace;font-size:12px;color:${color};min-width:28px;text-align:right;">${score}</span>
          </div>`;
        }).join('');
      }
    },

    // ── GENERIC PLACEHOLDER ───────────────────────────────────
    '_default': {
      init(container) {
        container.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text-dim);">
          <div style="font-size:18px;margin-bottom:8px;">${PANEL_INFO?PANEL_INFO.icon:'&#128736;'}</div>
          <div style="font-size:13px;">${PANEL_INFO?PANEL_INFO.title:'Unknown Panel'}</div>
          <div style="font-size:11px;margin-top:4px;">This panel is available in the classic dashboard.</div>
          <a href="/classic" style="color:var(--accent);font-size:11px;">Open Classic Dashboard</a>
        </div>`;
      },
      onEvent() {}
    }
  };

  // ═══════════════════════════════════════════════════════════════
  // HAL HELPERS
  // ═══════════════════════════════════════════════════════════════
  function halSend() {
    const input = $('hal-input');
    if (!input || !input.value.trim()) return;
    fetch('/api/hal/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: input.value.trim() })
    });
    input.value = '';
  }

  function halClear() {
    const renderer = PanelRenderers['panel-hal'];
    if (renderer) { renderer._entries = []; renderer.render(); }
  }

  // ═══════════════════════════════════════════════════════════════
  // BOOT
  // ═══════════════════════════════════════════════════════════════
  const renderer = PanelRenderers[PANEL_ID] || PanelRenderers['_default'];
  const container = $('panel-content');

  DashWS.on('init', () => {
    $('loading').style.display = 'none';
    renderer.init(container);
  });

  DashWS.onAny((msg) => {
    if (renderer.onEvent) renderer.onEvent(msg);
  });

  DashWS.connect();
</script>
</body>
</html>
