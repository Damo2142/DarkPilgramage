<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Reference</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #141210;
      color: #c8b89a;
      font-family: sans-serif;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e8c060;
      font-family: serif;
    }
  </style>
</head>
<body>
<div id="loading">Loading DM Reference…</div>
<script>
// ═══════════════════════════════════════════════════════════════
// /dm/ref — DM Reference Display
// Loads index.html, removes the map column (#col-transcript) and
// the controls column (#col-controls), expands the players column
// to full width. The players column already contains the reference
// panels (DDB sync, players, NPC dialogue, NPC actions, NPC manual,
// secrets, pacing, horror, beats, campaign, etc.)
// Map canvas element is REMOVED from DOM.
// ═══════════════════════════════════════════════════════════════
fetch('/classic-source', { cache: 'no-store' }).then(function(r) { return r.text(); }).then(function(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');

  // Remove the entire LEFT column (map + transcript)
  var transcriptCol = doc.getElementById('col-transcript');
  if (transcriptCol) transcriptCol.parentNode.removeChild(transcriptCol);

  var resizer1 = doc.getElementById('resizer-1');
  if (resizer1) resizer1.parentNode.removeChild(resizer1);

  // Remove the MIDDLE column (controls — Max input, atmosphere, session etc.)
  var controlsCol = doc.getElementById('col-controls');
  if (controlsCol) controlsCol.parentNode.removeChild(controlsCol);

  var resizer2 = doc.getElementById('resizer-2');
  if (resizer2) resizer2.parentNode.removeChild(resizer2);

  // Remove map canvas explicitly
  var mapCanvas = doc.getElementById('map-canvas');
  if (mapCanvas) mapCanvas.parentNode.removeChild(mapCanvas);

  // Expand players column to full width and use two-column flex inside
  var playersCol = doc.getElementById('col-players');
  if (playersCol) {
    playersCol.style.cssText = 'flex: 1 1 100%; max-width: 100%; width: 100%; min-width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; align-items: start;';
  }

  doc.body.classList.add('view-dm-ref');
  doc.body.dataset.dmView = 'ref';

  var marker = doc.createElement('script');
  marker.textContent = 'window.__DM_VIEW="ref";';
  doc.body.insertBefore(marker, doc.body.firstChild);

  var serialized = '<!DOCTYPE html>' + doc.documentElement.outerHTML;
  document.open();
  document.write(serialized);
  document.close();
}).catch(function(err) {
  document.getElementById('loading').innerHTML = '<div style="color:#a44;">Failed to load: ' + err.message + '</div>';
});
</script>
</body>
</html>
