<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Reference</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

    :root {
      --bg: #161412;
      --surface: #242018;
      --surface2: #2e2820;
      --absent-bg: #1a1814;
      --absent-text: #4a4030;
      --text: #f0e0c0;
      --text-dim: #b09070;
      --text-dimmer: #706050;
      --gold: #f0c840;
      --green: #6aaa6a;
      --amber: #e09030;
      --red: #cc3020;
      --purple: #8a7aaa;
      --blue: #4a8aaa;
      --orange: #cc6030;
      --terror: #aa2080;
      --border: #3a3028;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    #screen {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      height: 100vh;
      width: 100vw;
      background: var(--border);
    }

    .col {
      background: var(--bg);
      overflow-y: auto;
      padding: 16px;
    }
    .col::-webkit-scrollbar { width: 8px; }
    .col::-webkit-scrollbar-track { background: var(--bg); }
    .col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      padding-bottom: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    h2 .h2-meta { font-size: 11px; color: var(--text-dimmer); letter-spacing: 0; font-family: monospace; font-weight: normal; text-transform: none; }
    h2:not(:first-child) { margin-top: 24px; }

    /* ─── PLAYER CARDS ─── */
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 12px;
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .player-card:hover { border-color: var(--gold); }
    .player-card.absent {
      background: var(--absent-bg);
      cursor: default;
    }
    .player-card.absent:hover { border-color: var(--border); }
    .player-card .name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .player-card .pname {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .player-card .pclass {
      font-size: 13px;
      color: var(--text-dim);
      margin-right: 28px;
    }
    .player-card .seat {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dimmer);
      font-size: 14px;
      padding: 1px 8px;
      border-radius: 3px;
      cursor: pointer;
      z-index: 5;
    }
    .player-card .seat:hover { color: var(--gold); border-color: var(--gold); }
    .pc-divider {
      border-top: 1px solid var(--border);
      margin: 10px -16px 10px;
    }
    .pc-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .pc-row .label {
      width: 70px;
      flex-shrink: 0;
      color: var(--text-dimmer);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pc-row .value {
      flex: 1;
      color: var(--text);
    }
    .pc-row .value.dim { color: var(--text-dim); }
    .pc-row .value.warn { color: var(--amber); }
    .pc-row .value.crit { color: var(--red); }
    .pc-row .right { margin-left: auto; color: var(--text); font-family: monospace; font-size: 13px; }
    .bar {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }
    .stamina .bar-fill { background: var(--green); }
    .stamina.warn .bar-fill { background: var(--amber); }
    .stamina.crit .bar-fill { background: var(--red); }
    .horror .bar-fill { background: var(--green); }
    .horror.warn .bar-fill { background: var(--amber); }
    .horror.crit .bar-fill { background: var(--red); }

    /* Stamina torch icon */
    .stamina-torch {
      display: inline-block;
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      font-size: 18px;
      flex-shrink: 0;
    }
    .stamina-torch.fresh { opacity: 1; filter: drop-shadow(0 0 4px #f0c840); }
    .stamina-torch.winded { opacity: 0.85; }
    .stamina-torch.exhausted { opacity: 0.5; }
    .stamina-torch.spent { opacity: 0.3; }
    .stamina-torch.collapsed { opacity: 0.2; filter: grayscale(1); }

    /* Wound dots */
    .wound-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .wound-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--text-dimmer);
      background: transparent;
    }
    .wound-dot.w1 { background: #d4a017; border-color: #d4a017; }
    .wound-dot.w2 { background: #d47017; border-color: #d47017; }
    .wound-dot.w3 { background: var(--red); border-color: var(--red); }
    .wound-dot.w4 { background: #800000; border-color: #800000; }
    .wound-state-label {
      margin-left: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Spell slot diamonds */
    .slots {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .slot-pip {
      display: inline-block;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      border: 1px solid var(--gold);
    }
    .slot-pip.filled { background: var(--gold); }
    .slot-pip.empty { background: transparent; }
    .slot-meta { font-size: 11px; color: var(--text-dim); margin-left: 6px; }

    /* Arc */
    .arc-line {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* Absent overlay */
    .absent-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--absent-text);
      pointer-events: none;
    }

    /* ─── COMBAT TRACKER ─── */
    #combat-tracker { margin-top: 16px; }
    #combat-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-dimmer);
      font-style: italic;
      font-size: 13px;
    }
    #round-display {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-align: center;
      padding: 12px;
      background: var(--surface);
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .init-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-left: 3px solid transparent;
      margin-bottom: 4px;
      font-size: 15px;
      border-radius: 0 3px 3px 0;
    }
    .init-row.current {
      background: #3a2010;
      border-left-color: var(--gold);
    }
    .init-row .turn-arrow {
      width: 14px;
      color: var(--gold);
      font-size: 14px;
    }
    .init-row .iname { flex: 1; color: var(--text); font-weight: 500; }
    .init-row .iconds { font-size: 11px; color: var(--amber); }
    .init-row .iinit {
      font-family: monospace;
      font-size: 14px;
      color: var(--text-dim);
      width: 32px;
      text-align: right;
    }
    #next-turn-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      border-radius: 4px;
    }
    #next-turn-btn:hover { background: #3a2010; }

    /* ─── NPC POSITIONS ─── */
    #npc-positions {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.7;
    }
    .npc-row {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .npc-row:hover { background: var(--surface); }
    .npc-row .npc-name {
      width: 180px;
      flex-shrink: 0;
      color: var(--text);
    }
    .npc-row .npc-loc {
      flex: 1;
      color: var(--text-dim);
    }
    .npc-row .emo-tag {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .emo-calm { background: rgba(106,170,106,0.15); color: var(--green); }
    .emo-watchful { background: rgba(176,144,112,0.15); color: var(--text-dim); }
    .emo-nervous { background: rgba(224,144,48,0.15); color: var(--amber); }
    .emo-desperate { background: rgba(204,96,48,0.15); color: var(--orange); }
    .emo-hostile { background: rgba(204,48,32,0.15); color: var(--red); }
    .emo-terrified { background: rgba(170,32,128,0.15); color: var(--terror); }
    .emo-hidden {
      background: transparent;
      color: var(--text-dimmer);
      font-style: italic;
    }
    .npc-row.hidden .npc-name,
    .npc-row.hidden .npc-loc { color: var(--text-dimmer); }

    /* ─── DISCOVERED ─── */
    #clues-list { max-height: 200px; overflow-y: auto; }
    .clue-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .clue-row:last-child { border: none; }
    .clue-row .clue-time {
      font-family: monospace;
      color: var(--text-dimmer);
      flex-shrink: 0;
      width: 50px;
    }
    .clue-row .clue-text { color: var(--text); flex: 1; }

    /* ─── PLAYER CHAT ─── */
    #chat-list { max-height: 200px; overflow-y: auto; }
    .chat-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      transition: background 1s ease;
    }
    .chat-row:last-child { border: none; }
    .chat-row.new { background: rgba(240, 200, 64, 0.1); }
    .chat-row .chat-from {
      color: var(--gold);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .chat-row .chat-time {
      color: var(--text-dimmer);
      font-family: monospace;
      font-size: 10px;
      margin-left: 8px;
    }
    .chat-row .chat-text {
      color: var(--text);
      margin-top: 2px;
      line-height: 1.4;
    }

    /* ─── OVERLAYS (player sheet, NPC card) ─── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    #overlay.open { display: flex; }
    #overlay-content {
      background: var(--surface);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 24px 32px;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      width: 100%;
      position: relative;
    }
    #overlay-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 18px;
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
    }
    #overlay-close:hover { color: var(--gold); border-color: var(--gold); }

    .ov-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      padding-right: 50px;
    }
    .ov-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }
    .ov-section {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 14px;
    }
    .ov-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .ov-row {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      font-size: 13px;
    }
    .ov-row .ov-label {
      width: 110px;
      flex-shrink: 0;
      color: var(--text-dimmer);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .ov-row .ov-val { flex: 1; color: var(--text); }
    .ov-disp {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px 12px;
      font-size: 13px;
    }
    .ov-disp .name { color: var(--gold); }
    .ov-disp .text { color: var(--text); }
    .threat-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .threat-bar-fill {
      width: 200px;
      height: 12px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
    }
    .threat-bar-fill > div {
      height: 100%;
      background: var(--red);
    }
    .momentum-list { font-size: 12px; }
    .momentum-list div { padding: 4px 0; color: var(--text-dim); }
    .momentum-list div b { color: var(--text); }
    .momentum-current { color: var(--gold); font-weight: 600; }
  </style>
</head>
<body>

<div id="screen">

  <!-- LEFT COLUMN — Players & Combat -->
  <div class="col">
    <h2>Players</h2>
    <div id="player-cards"></div>

    <h2>Combat <span class="h2-meta" id="combat-meta"></span></h2>
    <div id="combat-tracker">
      <div id="combat-empty">No active combat</div>
    </div>
  </div>

  <!-- RIGHT COLUMN — World & NPCs -->
  <div class="col">
    <h2>NPC Positions <span class="h2-meta" id="game-time-display">17:30</span></h2>
    <div id="npc-positions"></div>

    <h2>Discovered This Session <span class="h2-meta" id="clues-meta"></span></h2>
    <div id="clues-list"></div>

    <h2>Player Chat</h2>
    <div id="chat-list"></div>
  </div>

</div>

<!-- Overlay for player sheet / NPC card -->
<div id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div id="overlay-content">
    <button id="overlay-close" onclick="closeOverlay()">×</button>
    <div id="overlay-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// /dm/ref — Status board
// Read-only. Player cards (expanded), combat, NPC positions, clues, chat.
// Click a player card → full character sheet overlay.
// Click an NPC row → full NPC brief overlay.
// ═══════════════════════════════════════════════════════════════
var ws = null;
var stateData = { players: {}, npcs: {}, combat: null, world: {}, story: {}, map: {} };
var configData = {};
var clues = [];
var chatMessages = [];

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function pad(n) { return String(n).padStart(2, '0'); }

function fmtTime(d) {
  var date = (d instanceof Date) ? d : new Date(d);
  return pad(date.getHours()) + ':' + pad(date.getMinutes());
}
function fmtGameTime(iso) {
  if (!iso) return '17:30';
  var d = new Date(iso);
  return pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
}

// ═══════════════════════════════════════════════════════════════
// PLAYER CARDS — expanded
// ═══════════════════════════════════════════════════════════════
var WOUND_STATE_LABELS = ['Pristine', 'Bruised', 'Wounded', 'Badly Wounded', 'Critical', 'Down'];

function aggregateWoundState(wounds) {
  if (!wounds) return 0;
  var max = 0;
  var sum = 0;
  ['head', 'torso', 'leftArm', 'rightArm', 'leftLeg', 'rightLeg'].forEach(function(limb) {
    var s = wounds[limb] || 0;
    if (s > max) max = s;
    sum += s;
  });
  // Aggregate state index 0..5
  if (max >= 4) return 5;
  if (max >= 3) return 4;
  if (max >= 2) return 3;
  if (max >= 1 && sum >= 3) return 2;
  if (sum >= 1) return 1;
  return 0;
}

function staminaState(current, max) {
  if (!max || max <= 0) return 'fresh';
  var pct = (current / max) * 100;
  if (pct >= 75) return 'fresh';
  if (pct >= 50) return 'winded';
  if (pct >= 25) return 'exhausted';
  if (pct > 0) return 'spent';
  return 'collapsed';
}

function renderPlayers() {
  var el = $('player-cards');
  var allPlayers = stateData.players || {};
  // Use union of state.players AND known config players (from backstories)
  var pids = Object.keys(allPlayers).filter(function(pid) { return allPlayers[pid]; });
  if (!pids.length) {
    el.innerHTML = '<div style="color:var(--text-dimmer);text-align:center;padding:20px;font-style:italic;">No players loaded</div>';
    return;
  }
  el.innerHTML = pids.map(function(pid) { return renderPlayerCard(pid, allPlayers[pid]); }).join('');
}

function renderPlayerCard(pid, p) {
  var ch = p.character || {};
  var name = ch.name || pid;
  var className = ch.class || ch.className || '';
  var level = ch.level || '';
  var pp = ch.passivePerception || ch.passive_perception || 10;
  var isAbsent = !!p.absent;
  var notYetArrived = !!p.notYetArrived;

  if (notYetArrived) {
    return '<div class="player-card absent">' +
      '<button class="seat" onclick="event.stopPropagation();toggleAbsent(\'' + pid + '\')" title="Mark present">⚐</button>' +
      '<div class="name-row"><div class="pname" style="color:var(--absent-text);">' + esc(name) + '</div></div>' +
      '<div class="absent-overlay">NOT YET ARRIVED</div>' +
      '<div style="height:120px;"></div>' +
      '</div>';
  }
  if (isAbsent) {
    return '<div class="player-card absent">' +
      '<button class="seat" onclick="event.stopPropagation();toggleAbsent(\'' + pid + '\')" title="Mark present">⚐</button>' +
      '<div class="name-row"><div class="pname" style="color:var(--absent-text);">' + esc(name) + '</div></div>' +
      '<div class="absent-overlay">NOT YET ARRIVED</div>' +
      '<div style="height:120px;"></div>' +
      '</div>';
  }

  // Stamina
  var stamina = p.stamina || {};
  var staminaCur = stamina.current || 0;
  var staminaMax = stamina.max || 1;
  var staminaPct = Math.max(0, Math.min(100, (staminaCur / staminaMax) * 100));
  var staminaCls = staminaPct > 50 ? '' : staminaPct > 25 ? 'warn' : 'crit';
  var torchState = stamina.state || staminaState(staminaCur, staminaMax);
  var torchSvg = '<span class="stamina-torch ' + torchState + '" title="' + torchState + ' (' + staminaCur + '/' + staminaMax + ')">🔥</span>';

  // Wounds
  var wounds = p.wounds || {};
  var limbOrder = ['head', 'torso', 'leftArm', 'rightArm', 'leftLeg', 'rightLeg'];
  var woundDots = limbOrder.map(function(limb) {
    var s = wounds[limb] || 0;
    return '<span class="wound-dot' + (s > 0 ? ' w' + s : '') + '" title="' + limb + ': ' + s + '"></span>';
  }).join('');
  var woundStateLabel = WOUND_STATE_LABELS[aggregateWoundState(wounds)];

  // Horror
  var horror = (p.horror && (p.horror.score || p.horror.value)) || (p.dread && p.dread.score) || 0;
  var horrorPct = Math.max(0, Math.min(100, horror));
  var horrorCls = horror > 70 ? 'crit' : horror > 40 ? 'warn' : '';

  // Spell slots — render diamond pips
  var slotsHtml = '';
  var slotMeta = '';
  if (ch.spellSlots) {
    var allSlots = [];
    var totalAvail = 0, totalMax = 0;
    for (var lvl = 1; lvl <= 9; lvl++) {
      var slot = ch.spellSlots[lvl] || ch.spellSlots['level' + lvl];
      if (slot && slot.max) {
        for (var s = 0; s < slot.max; s++) {
          allSlots.push(s < (slot.current || 0) ? 'filled' : 'empty');
        }
        totalAvail += (slot.current || 0);
        totalMax += slot.max;
      }
    }
    if (allSlots.length) {
      slotsHtml = allSlots.map(function(s) { return '<span class="slot-pip ' + s + '"></span>'; }).join('');
      slotMeta = '<span class="slot-meta">(' + totalAvail + '/' + totalMax + ' remaining)</span>';
    }
  }

  // Light source from inventory
  var lightInfo = computeLightSource(ch.inventory || []);

  // Languages
  var languages = (ch.languages || []).join(', ') || 'Common';

  // Conditions
  var conds = (p.conditions || []).filter(Boolean);
  var statusLine = conds.length ? conds.join(', ') : 'none';

  // Arc beat
  var arcBeat = (p.arcBeat || (p.arcProfile && p.arcProfile.currentBeat) || ch.background || '');

  return '<div class="player-card" onclick="openPlayerSheet(\'' + pid + '\')">' +
    '<button class="seat" onclick="event.stopPropagation();toggleAbsent(\'' + pid + '\')" title="Mark absent">⚐</button>' +
    '<div class="name-row">' +
      '<div class="pname">' + esc(name) + '</div>' +
      '<div class="pclass">' + esc(className) + ' ' + esc(level) + '</div>' +
    '</div>' +
    '<div class="pc-divider"></div>' +
    '<div class="pc-row stamina ' + staminaCls + '">' +
      '<span class="label">Stamina</span>' +
      '<div class="bar"><div class="bar-fill" style="width:' + staminaPct + '%"></div></div>' +
      torchSvg +
      '<span class="right">PP: ' + pp + '</span>' +
    '</div>' +
    '<div class="pc-row">' +
      '<span class="label">Wounds</span>' +
      '<div class="wound-dots">' + woundDots + '<span class="wound-state-label">' + woundStateLabel + '</span></div>' +
    '</div>' +
    '<div class="pc-row horror ' + horrorCls + '">' +
      '<span class="label">Horror</span>' +
      '<div class="bar"><div class="bar-fill" style="width:' + horrorPct + '%"></div></div>' +
      '<span class="right">' + horror + '</span>' +
    '</div>' +
    (slotsHtml ? '<div class="pc-divider"></div><div class="pc-row"><span class="label">Slots</span><div class="slots">' + slotsHtml + slotMeta + '</div></div>' : '<div class="pc-divider"></div>') +
    '<div class="pc-row"><span class="label">Light</span><span class="value' + (lightInfo.warn ? ' warn' : '') + '">' + esc(lightInfo.text) + '</span></div>' +
    '<div class="pc-row"><span class="label">Langs</span><span class="value">' + esc(languages) + '</span></div>' +
    '<div class="pc-row"><span class="label">Status</span><span class="value' + (conds.length ? ' warn' : ' dim') + '">' + esc(statusLine) + '</span></div>' +
    (arcBeat ? '<div class="arc-line">' + esc(String(arcBeat).slice(0, 200)) + '</div>' : '') +
    '</div>';
}

function computeLightSource(inventory) {
  var lights = ['torch', 'lantern', 'lamp', 'candle'];
  for (var i = 0; i < inventory.length; i++) {
    var item = inventory[i];
    var name = (item.name || '').toLowerCase();
    if (item.equipped || (item.lit !== undefined ? item.lit : true)) {
      for (var li = 0; li < lights.length; li++) {
        if (name.indexOf(lights[li]) !== -1) {
          var hours = item.fuelHours != null ? item.fuelHours : (lights[li] === 'torch' ? 1 : lights[li] === 'lantern' ? 6 : lights[li] === 'lamp' ? 6 : 1);
          return { text: item.name + ' — ' + hours + 'h remaining', warn: hours < 1 };
        }
      }
    }
  }
  return { text: 'No light source — DARK', warn: true };
}

function toggleAbsent(pid) {
  var p = stateData.players[pid] || {};
  var isAbsent = !!p.absent;
  var name = (p.character && p.character.name) || pid;
  if (!confirm('Mark ' + name + (isAbsent ? ' as PRESENT?' : ' as absent for this session?'))) return;
  fetch('/api/absent/' + pid, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ absent: !isAbsent })
  }).then(function(r) { return r.json(); }).then(function() {
    if (!stateData.players[pid]) stateData.players[pid] = {};
    stateData.players[pid].absent = !isAbsent;
    if (!isAbsent) stateData.players[pid].notYetArrived = false;
    renderPlayers();
  });
}

// ═══════════════════════════════════════════════════════════════
// PLAYER SHEET OVERLAY
// ═══════════════════════════════════════════════════════════════
function openPlayerSheet(pid) {
  var p = stateData.players[pid];
  if (!p) return;
  var ch = p.character || {};
  var ab = ch.abilities || ch.stats || {};
  var skills = ch.skills || {};
  var spells = ch.spells || [];
  var inventory = ch.inventory || [];
  var features = ch.features || [];
  var html = '<div class="ov-title">' + esc(ch.name || pid) + '</div>' +
    '<div class="ov-subtitle"><span>' + esc(ch.race || '') + ' ' + esc(ch.class || '') + ' ' + (ch.level || '') + '</span><span>HP ' + (ch.hp ? (ch.hp.current + '/' + ch.hp.max) : '?') + '  AC ' + (ch.ac || '?') + '</span></div>' +

    '<div class="ov-section"><h3>Abilities</h3><div class="ov-disp">';
  ['str','dex','con','int','wis','cha'].forEach(function(k) {
    if (ab[k] != null) html += '<div class="name">' + k.toUpperCase() + '</div><div class="text">' + ab[k] + '</div>';
  });
  html += '</div></div>';

  if (Object.keys(skills).length) {
    html += '<div class="ov-section"><h3>Skills</h3><div class="ov-disp">';
    for (var k in skills) {
      html += '<div class="name">' + esc(k) + '</div><div class="text">' + (skills[k].mod != null ? '+' + skills[k].mod : esc(JSON.stringify(skills[k]))) + '</div>';
    }
    html += '</div></div>';
  }

  if (spells.length) {
    html += '<div class="ov-section"><h3>Spells (' + spells.length + ')</h3><div style="font-size:12px;color:var(--text-dim);">';
    html += spells.slice(0, 30).map(function(s) { return esc(s.name || s); }).join(', ');
    html += '</div></div>';
  }

  if (inventory.length) {
    html += '<div class="ov-section"><h3>Inventory</h3><div style="font-size:12px;color:var(--text-dim);">';
    html += inventory.slice(0, 40).map(function(i) {
      var n = i.name || i;
      var eq = i.equipped ? ' [EQUIPPED]' : '';
      return esc(n) + eq;
    }).join(' · ');
    html += '</div></div>';
  }

  if (ch.backstory || p.arcProfile) {
    html += '<div class="ov-section"><h3>Backstory & Arc</h3><div style="font-size:12px;color:var(--text-dim);font-style:italic;">';
    if (ch.backstory) html += esc(typeof ch.backstory === 'string' ? ch.backstory : JSON.stringify(ch.backstory)).slice(0, 800) + '<br><br>';
    if (p.arcProfile && p.arcProfile.summary) html += esc(p.arcProfile.summary);
    html += '</div></div>';
  }

  $('overlay-body').innerHTML = html;
  $('overlay').classList.add('open');
}

function closeOverlay() {
  $('overlay').classList.remove('open');
  $('overlay-body').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════
// COMBAT TRACKER
// ═══════════════════════════════════════════════════════════════
function renderCombat() {
  var el = $('combat-tracker');
  var meta = $('combat-meta');
  var combat = stateData.combat;
  if (!combat || !combat.active || !combat.turnOrder || !combat.turnOrder.length) {
    el.innerHTML = '<div id="combat-empty">No active combat</div>';
    meta.textContent = '';
    return;
  }
  // Filter out absent players from initiative tracker
  var visible = combat.turnOrder.filter(function(c) {
    var p = stateData.players[c.id];
    return !(p && (p.absent || p.notYetArrived));
  });
  meta.textContent = visible.length + ' combatants';
  var html = '<div id="round-display">ROUND ' + (combat.round || 1) + '</div>';
  html += visible.map(function(c, i) {
    var isCurrent = i === combat.currentTurn;
    var conds = (c.conditions || []).join(', ');
    var hp = c.hp || {};
    var hpPct = hp.max ? Math.round((hp.current / hp.max) * 100) : 0;
    var woundLabel = hpPct === 0 ? 'unconscious' : hpPct < 25 ? 'bloodied' : hpPct < 50 ? 'wounded' : '';
    var tags = [];
    if (woundLabel) tags.push(woundLabel);
    if (conds) tags.push(conds);
    return '<div class="init-row' + (isCurrent ? ' current' : '') + '">' +
      '<div class="turn-arrow">' + (isCurrent ? '▶' : '') + '</div>' +
      '<div class="iname">' + esc(c.name || c.id) + '</div>' +
      (tags.length ? '<div class="iconds">[' + esc(tags.join(', ')) + ']</div>' : '') +
      '<div class="iinit">' + (c.initiative != null ? c.initiative : '?') + '</div>' +
      '</div>';
  }).join('');
  html += '<button id="next-turn-btn" onclick="nextTurn()">▶ NEXT TURN</button>';
  el.innerHTML = html;
}

function nextTurn() { fetch('/api/combat/next', { method: 'POST' }).catch(function() {}); }

// ═══════════════════════════════════════════════════════════════
// NPC POSITIONS
// ═══════════════════════════════════════════════════════════════
function renderNpcPositions() {
  var el = $('npc-positions');
  var npcs = collectAllNpcs();
  if (!npcs.length) {
    el.innerHTML = '<div style="color:var(--text-dimmer);font-style:italic;">No NPCs in scene</div>';
    return;
  }
  el.innerHTML = npcs.map(function(n) {
    var emoTag = n.hidden ? 'hidden' : (n.emotion || 'watchful');
    var emoCls = 'emo-' + emoTag;
    var locText = n.location || '—';
    if (n.hidden) locText += '  [HIDDEN]';
    return '<div class="npc-row' + (n.hidden ? ' hidden' : '') + '" onclick="openNpcCard(\'' + n.id + '\')">' +
      '<span class="npc-name">' + esc(n.name) + '</span>' +
      '<span class="npc-loc">' + esc(locText) + '</span>' +
      '<span class="emo-tag ' + emoCls + '">' + esc(emoTag) + '</span>' +
      '</div>';
  }).join('');
}

function collectAllNpcs() {
  var result = [];
  var npcs = stateData.npcs || {};
  for (var id in npcs) {
    var n = npcs[id];
    if (!n || !n.name) continue;
    var token = stateData.map && stateData.map.tokens && stateData.map.tokens[id];
    var emotion = n.emotionalState || n.disposition || 'watchful';
    if (typeof emotion !== 'string') emotion = 'watchful';
    result.push({
      id: id,
      name: n.name,
      location: n.location || (token && token.location) || '—',
      hidden: (token && token.hidden) || (n.location && /cellar/i.test(n.location) && !stateData.world?.secrets?.cellar_contents?.revealed),
      emotion: emotion.toLowerCase()
    });
  }
  ['patron-farmer', 'patron-merchant', 'patron-pilgrim', 'patron-minstrel'].forEach(function(k) {
    var p = configData[k];
    if (p && p.name) {
      result.push({
        id: k,
        name: p.name,
        location: p.location || '—',
        hidden: false,
        emotion: (p.disposition && typeof p.disposition === 'string') ? p.disposition.toLowerCase() : 'calm'
      });
    }
  });
  return result;
}

// ═══════════════════════════════════════════════════════════════
// NPC CARD OVERLAY
// ═══════════════════════════════════════════════════════════════
function openNpcCard(npcId) {
  var n = stateData.npcs && stateData.npcs[npcId];
  if (!n) n = configData[npcId];
  if (!n) return;

  var dialogueHistory = n.dialogueHistory || [];
  var lastSaid = dialogueHistory.length ? dialogueHistory[dialogueHistory.length - 1] : '';
  var threat = n.threatLevel || (n.cr ? Math.min(10, Math.round(parseFloat(n.cr) * 0.7)) : 1);
  var threatPct = (threat / 10) * 100;
  var threatLabel = threat >= 8 ? 'Extreme' : threat >= 6 ? 'High' : threat >= 4 ? 'Moderate' : threat >= 2 ? 'Low' : 'Minimal';

  var voiceLabel = '';
  if (n.voiceProfileDetails && n.voiceProfileDetails.fallbackEchoVoice) {
    voiceLabel = (n.voiceCode || '?') + ' — ' + n.voiceProfileDetails.fallbackEchoVoice;
  } else if (n.voiceProfile) {
    voiceLabel = n.voiceProfile;
  }

  var html = '<div class="ov-title">' + esc(n.name) + (n.cr ? '  <span style="font-size:14px;color:var(--text-dim);">CR ' + n.cr + '</span>' : '') + '</div>' +
    '<div class="ov-subtitle"><span>' + esc(n.trueIdentity || n.role || '') + '</span><span>' + esc(voiceLabel) + '</span></div>' +

    '<div class="ov-section">' +
    (n.role ? '<div class="ov-row"><span class="ov-label">Surface</span><span class="ov-val">' + esc(n.role) + '</span></div>' : '') +
    (n.secret ? '<div class="ov-row"><span class="ov-label">Secret</span><span class="ov-val">' + esc(n.secret) + '</span></div>' : '') +
    (n.tell ? '<div class="ov-row"><span class="ov-label">Tell</span><span class="ov-val">' + esc(n.tell) + '</span></div>' : '') +
    (n.motivation ? '<div class="ov-row"><span class="ov-label">Motivation</span><span class="ov-val">' + esc(n.motivation) + '</span></div>' : '') +
    '<div class="ov-row"><span class="ov-label">State</span><span class="ov-val">' + esc(n.emotionalState || n.disposition || 'unknown') + '</span></div>' +
    '</div>' +

    '<div class="ov-section">' +
    '<div class="ov-row"><span class="ov-label">Threat</span><span class="ov-val"><div class="threat-bar"><div class="threat-bar-fill"><div style="width:' + threatPct + '%"></div></div><span>' + threatLabel + '</span></div></span></div>' +
    (n.mirrorReflection ? '<div class="ov-row"><span class="ov-label">Mirror</span><span class="ov-val">' + esc(n.mirrorReflection === 'none' ? 'No reflection — absolute absence' : n.mirrorReflection === 'distorted' ? 'Distorted — wrong proportions' : 'Normal') + '</span></div>' : '') +
    (voiceLabel ? '<div class="ov-row"><span class="ov-label">Voice</span><span class="ov-val">' + esc(voiceLabel) + '</span></div>' : '') +
    (n.languages ? '<div class="ov-row"><span class="ov-label">Languages</span><span class="ov-val">' + esc(typeof n.languages === 'string' ? n.languages : (n.languages || []).join(', ')) + '</span></div>' : '') +
    '</div>';

  // Disposition toward each player
  if (n.dispositions || n.disposition) {
    var disp = n.dispositions || (typeof n.disposition === 'object' ? n.disposition : null);
    if (disp && typeof disp === 'object') {
      html += '<div class="ov-section"><h3>Disposition</h3><div class="ov-disp">';
      for (var pid in disp) {
        if (typeof disp[pid] === 'string') {
          html += '<div class="name">' + esc(pid) + '</div><div class="text">' + esc(disp[pid]) + '</div>';
        }
      }
      html += '</div></div>';
    }
  }

  // Social combat momentum
  if (n.letavecKnowledge && n.letavecKnowledge.socialCombatUnlocks) {
    var current = (stateData.socialCombat && stateData.socialCombat[npcId] && stateData.socialCombat[npcId].momentum) || 0;
    html += '<div class="ov-section"><h3>Social Combat Momentum <span class="momentum-current">Current: ' + current + '/10</span></h3><div class="momentum-list">';
    n.letavecKnowledge.socialCombatUnlocks.forEach(function(u) {
      html += '<div><b>m' + u.momentum + '</b> &nbsp; ' + esc(u.reveals) + '</div>';
    });
    html += '</div></div>';
  }

  if (lastSaid) {
    html += '<div class="ov-section"><h3>Last Said</h3><div style="font-size:13px;color:var(--text-dim);font-style:italic;">"' + esc(lastSaid) + '"</div></div>';
  }

  if (n.knowledge) {
    var knowledge = Array.isArray(n.knowledge) ? n.knowledge.slice(0, 6).join(' · ') : String(n.knowledge);
    html += '<div class="ov-section"><h3>Knows</h3><div style="font-size:12px;color:var(--text-dim);">' + esc(knowledge) + '</div></div>';
  }

  $('overlay-body').innerHTML = html;
  $('overlay').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════
// CLUES
// ═══════════════════════════════════════════════════════════════
function addClue(text, time) {
  var t = time || fmtGameTime(stateData.world && stateData.world.gameTime);
  clues.unshift({ time: t, text: text });
  if (clues.length > 30) clues.pop();
  renderClues();
}

function renderClues() {
  var el = $('clues-list');
  $('clues-meta').textContent = clues.length + ' total';
  if (!clues.length) {
    el.innerHTML = '<div style="color:var(--text-dimmer);font-style:italic;font-size:12px;padding:8px 0;">Nothing yet</div>';
    return;
  }
  var visible = clues.slice(0, 8);
  el.innerHTML = visible.map(function(c) {
    return '<div class="clue-row">' +
      '<div class="clue-time">' + esc(c.time) + '</div>' +
      '<div class="clue-text">' + esc(c.text) + '</div>' +
      '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════════════════
function addChat(from, text) {
  chatMessages.unshift({ from: from, text: text, time: fmtTime(new Date()), id: 'c-' + Date.now() });
  if (chatMessages.length > 20) chatMessages.pop();
  renderChat();
  setTimeout(function() {
    var first = document.querySelector('.chat-row');
    if (first) first.classList.remove('new');
  }, 1000);
}

function renderChat() {
  var el = $('chat-list');
  if (!chatMessages.length) {
    el.innerHTML = '<div style="color:var(--text-dimmer);font-style:italic;font-size:12px;padding:8px 0;">No messages</div>';
    return;
  }
  var visible = chatMessages.slice(0, 5);
  el.innerHTML = visible.map(function(m, i) {
    return '<div class="chat-row' + (i === 0 ? ' new' : '') + '">' +
      '<span class="chat-from">' + esc(m.from) + '</span>' +
      '<span class="chat-time">' + esc(m.time) + '</span>' +
      '<div class="chat-text">' + esc(m.text) + '</div>' +
      '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════
function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() { loadConfig(); };
  ws.onmessage = function(ev) {
    try { handleMsg(JSON.parse(ev.data)); } catch (err) { console.error(err); }
  };
  ws.onclose = function() { setTimeout(connect, 3000); };
}

function loadConfig() {
  fetch('/api/state').then(function(r) { return r.json(); }).then(function(data) {
    if (data) Object.assign(stateData, data);
    renderAll();
  }).catch(function() {});
  fetch('/api/session-config').then(function(r) { return r.json(); }).then(function(cfg) {
    configData = cfg || {};
    renderNpcPositions();
  }).catch(function() {});
}

function handleMsg(msg) {
  var t = msg.type || msg.event;
  if (!t) return;

  if (t === 'init') {
    var s = msg.state || {};
    Object.assign(stateData, s);
    renderAll();
    return;
  }

  if (t === 'state:change') {
    var p = msg.data && msg.data.path;
    var v = msg.data && msg.data.value;
    if (!p) return;
    var parts = p.split('.');
    var obj = stateData;
    for (var i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = v;

    if (p.indexOf('players.') === 0) renderPlayers();
    if (p === 'combat' || p.indexOf('combat.') === 0) renderCombat();
    if (p.indexOf('npcs.') === 0 || p.indexOf('map.tokens.') === 0) renderNpcPositions();
    if (p === 'world.gameTime') $('game-time-display').textContent = fmtGameTime(v);
    return;
  }

  if (t.indexOf('combat:') === 0) {
    if (msg.data && msg.data.combat) stateData.combat = msg.data.combat;
    renderCombat();
    return;
  }

  if (t === 'wounds:updated') {
    var d = msg.data || msg;
    if (d.playerId) {
      if (!stateData.players[d.playerId]) stateData.players[d.playerId] = {};
      stateData.players[d.playerId].wounds = d.wounds;
      renderPlayers();
    }
    return;
  }

  if (t === 'stamina:updated') {
    var sd = msg.data || msg;
    if (sd.playerId) {
      if (!stateData.players[sd.playerId]) stateData.players[sd.playerId] = {};
      stateData.players[sd.playerId].stamina = sd.stamina || sd;
      renderPlayers();
    }
    return;
  }

  if (t === 'horror:updated' || t === 'dread:update') {
    var hd = msg.data || msg;
    if (hd.playerId) {
      if (!stateData.players[hd.playerId]) stateData.players[hd.playerId] = {};
      stateData.players[hd.playerId].horror = { score: hd.score || hd.horror };
      renderPlayers();
    }
    return;
  }

  if (t === 'chat:party' || t === 'player:chat') {
    var c = msg.data || msg;
    var name = c.fromName || c.from || c.playerId || 'Player';
    addChat(name, c.text || '');
    return;
  }

  if (t === 'clue:found' || t === 'secret:reveal' || t === 'observation:fired') {
    var ev = msg.data || msg;
    var text = ev.description || ev.text || ev.id || '';
    addClue(text);
    return;
  }

  if (t === 'story:beat' && msg.data && msg.data.beatName) {
    addClue('Beat: ' + msg.data.beatName);
    return;
  }

  if (t === 'player:connected' || t === 'player:disconnected' || t === 'player:absent_changed') {
    setTimeout(loadConfig, 500);
    return;
  }

  // NPC emotional state updates
  if (t === 'npc:emotional_state') {
    var ne = msg.data || msg;
    if (ne.npcId && stateData.npcs[ne.npcId]) {
      stateData.npcs[ne.npcId].emotionalState = ne.state;
      renderNpcPositions();
    }
    return;
  }
}

function renderAll() {
  renderPlayers();
  renderCombat();
  renderNpcPositions();
  renderClues();
  renderChat();
  if (stateData.world && stateData.world.gameTime) {
    $('game-time-display').textContent = fmtGameTime(stateData.world.gameTime);
  }
}

window.openPlayerSheet = openPlayerSheet;
window.openNpcCard = openNpcCard;
window.closeOverlay = closeOverlay;
window.toggleAbsent = toggleAbsent;
window.nextTurn = nextTurn;

connect();
</script>
</body>
</html>
