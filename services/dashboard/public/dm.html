<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Center</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

    :root {
      --bg: #161412;
      --surface: #242018;
      --surface2: #2e2820;
      --text: #f0e0c0;
      --text-dim: #b09070;
      --text-dimmer: #706050;
      --gold: #f0c840;
      --green: #6aaa6a;
      --amber: #e09030;
      --red: #cc3020;
      --purple: #8a7aaa;
      --blue: #4a8aaa;
      --border: #3a3028;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ─── NAVIGATION STRIP ─── */
    #nav-strip {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #0e0c0a;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      height: 32px;
    }
    #nav-strip .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid transparent;
      border-radius: 3px;
    }
    #nav-strip .nav-link:hover { color: var(--text-dim); }
    #nav-strip .nav-link.active {
      color: var(--gold);
      border-color: var(--border);
      background: var(--surface);
    }
    #nav-strip .spacer { flex: 1; }
    #nav-strip .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      color: var(--text-dim);
      font-size: 11px;
    }
    #nav-strip .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dimmer);
    }
    #nav-strip .nav-dot.online { background: var(--green); }
    #nav-strip .nav-dot.offline { background: var(--red); }
    #nav-strip .nav-clock { color: var(--gold); font-weight: 600; }

    /* ─── LAYOUT ─── */
    #screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* WHISPER LOG — top 50% */
    #whisper-section {
      flex: 1 1 50%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
    }
    #whisper-header {
      padding: 12px 24px 8px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    #whisper-count { font-size: 11px; color: var(--text-dimmer); letter-spacing: 0; }
    #whisper-log {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 16px;
      scroll-behavior: smooth;
    }
    #whisper-log::-webkit-scrollbar { width: 8px; }
    #whisper-log::-webkit-scrollbar-track { background: var(--bg); }
    #whisper-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .whisper-entry {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: var(--surface);
      border-radius: 4px;
      border-left: 3px solid transparent;
      font-size: 18px;
      line-height: 1.35;
      transition: border-left-color 10s ease 1s;
    }
    .whisper-entry.unread {
      border-left-color: var(--gold);
      transition: border-left-color 10s ease 1s;
    }
    .whisper-time {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 13px;
      color: var(--text-dimmer);
      width: 56px;
      padding-top: 3px;
    }
    .whisper-tag {
      flex-shrink: 0;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      font-weight: 600;
      width: 110px;
      padding-top: 3px;
      text-align: right;
    }
    .whisper-tag.max { color: var(--gold); }
    .whisper-tag.event { color: var(--green); }
    .whisper-tag.combat { color: var(--red); }
    .whisper-tag.npc { color: var(--purple); }
    .whisper-tag.perception { color: var(--blue); }
    .whisper-tag.system { color: var(--text-dimmer); }
    .whisper-text {
      flex: 1;
      color: var(--text);
    }

    /* CURRENT EVENT — middle strip */
    #event-strip {
      flex: 0 0 auto;
      padding: 18px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      text-align: center;
      font-size: 22px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    #event-strip.warning { color: var(--amber); }
    #event-strip.urgent { color: var(--red); }
    #event-strip.firing {
      color: var(--gold);
      animation: pulse-gold 1s ease-in-out infinite;
    }
    @keyframes pulse-gold {
      0%, 100% { background: var(--surface); }
      50% { background: #3e3220; }
    }
    #event-countdown {
      font-family: monospace;
      font-size: 24px;
      font-weight: 600;
      margin-left: 12px;
    }

    /* SESSION STATUS BAR */
    #status-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-family: monospace;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .status-pill .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-dimmer);
      flex-shrink: 0;
    }
    .status-pill.online .dot { background: var(--green); }
    .status-pill.offline .dot { background: var(--red); }
    .status-pill.warm .dot { background: var(--gold); }
    .status-pill.tense .dot { background: var(--amber); }
    .status-pill.dread .dot { background: var(--red); }
    #panic-btn {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      border: 2px solid #ff4040;
      padding: 10px 24px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.15em;
      border-radius: 4px;
      cursor: pointer;
    }
    #panic-btn:hover { background: #ff4040; }

    /* SESSION CONTROL BUTTONS */
    .session-btn {
      background: var(--gold);
      color: #000;
      border: 2px solid #f0c840;
      padding: 10px 22px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.15em;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .session-btn:hover { background: #ffe060; }
    .session-btn:disabled,
    .session-btn.disabled {
      background: #3a3028;
      color: #706050;
      border-color: #3a3028;
      cursor: not-allowed;
    }
    .session-btn.large {
      font-size: 14px;
      padding: 12px 28px;
    }
    .session-btn.danger {
      background: var(--red);
      color: #fff;
      border-color: #ff4040;
    }
    .session-btn.danger:hover { background: #ff4040; }
    .session-btn.muted {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .session-btn.muted:hover { background: var(--surface2); }
    .testmode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 10px;
      border: 1px dashed var(--border);
      border-radius: 3px;
    }
    .testmode-toggle.active {
      color: var(--amber);
      border-color: var(--amber);
      border-style: solid;
    }
    .session-status-text {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.05em;
    }

    /* MAX INPUT — collapsed by default */
    #max-input-bar {
      flex: 0 0 auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #max-input-toggle {
      width: 100%;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.15em;
      padding: 8px;
      cursor: pointer;
    }
    #max-input-toggle:hover { color: var(--gold); }
    #max-input-area {
      display: none;
      padding: 12px 24px 16px;
      gap: 8px;
    }
    #max-input-area.open { display: flex; }
    #max-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 4px;
    }
    #max-input:focus { outline: none; border-color: var(--gold); }
    #max-send {
      background: var(--gold);
      color: #000;
      border: none;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.1em;
      padding: 0 24px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* REST panel — collapsed by default */
    #rest-bar {
      flex: 0 0 auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #rest-toggle {
      width: 100%;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.15em;
      padding: 8px;
      cursor: pointer;
    }
    #rest-toggle:hover { color: var(--gold); }
    #rest-area {
      display: none;
      padding: 12px 24px 16px;
    }
    #rest-area.open { display: block; }
    .rest-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1.5fr;
      gap: 16px;
      align-items: start;
    }
    .rest-section { display: flex; flex-direction: column; gap: 4px; }
    .rest-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .rest-section label {
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }
    .rest-section label input { accent-color: var(--gold); }
    .rest-section button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 2px;
    }
    .rest-section button:hover { background: var(--border); border-color: var(--gold); color: var(--gold); }

    /* ATMOSPHERE OVERRIDE — modal */
    #atmo-trigger {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 8px 14px;
      border-radius: 3px;
      cursor: pointer;
      z-index: 50;
    }
    #atmo-trigger:hover { color: var(--gold); border-color: var(--gold); }
    #atmo-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #atmo-modal.open { display: flex; }
    #atmo-modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      min-width: 480px;
    }
    #atmo-modal h3 {
      grid-column: 1 / -1;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 8px;
      text-transform: uppercase;
      text-align: center;
    }
    #atmo-modal button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 12px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
    }
    #atmo-modal button:hover { background: var(--border); border-color: var(--gold); color: var(--gold); }
    #atmo-modal button.cancel {
      grid-column: 1 / -1;
      color: var(--text-dim);
      font-size: 11px;
      padding: 6px;
    }
  </style>
</head>
<body>

<div id="screen">

  <div id="nav-strip">
    <a href="/dm" class="nav-link active">CENTER</a>
    <a href="/dm/map" class="nav-link">MAP</a>
    <a href="/dm/ref" class="nav-link">REF</a>
    <a href="/dm/classic" class="nav-link" target="_blank" rel="noopener" title="Original full dashboard — opens in new tab">CLASSIC</a>
    <span class="spacer"></span>
    <span class="nav-status">
      <span class="nav-dot" id="nav-ai-dot"></span>
      <span id="nav-ai-text">AI ?</span>
    </span>
    <span class="nav-status">
      <span class="nav-clock" id="nav-clock-strip">17:30</span>
      <span id="nav-tod">EVENING</span>
      <span id="nav-weather">BLIZZARD</span>
    </span>
  </div>

  <div id="whisper-section">
    <div id="whisper-header">
      <span>Max Whisper Log</span>
      <span id="whisper-count">0 entries</span>
    </div>
    <div id="whisper-log"></div>
  </div>

  <div id="event-strip"><span id="event-strip-text">Next: — --:--:--</span></div>

  <div id="session-controls" style="flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);">
    <button id="btn-start-campaign" class="session-btn large" onclick="SessionMode.startCampaign()" style="display:none;" title="Initialize the campaign — one-time only">★ START CAMPAIGN</button>
    <button id="btn-start-session" class="session-btn large" onclick="SessionMode.startSession()" style="display:none;">▶ START SESSION</button>
    <button id="btn-resume-save" class="session-btn muted" onclick="SessionMode.resumeSave()" style="display:none;">↻ Resume Save</button>
    <button id="btn-pause-session" class="session-btn muted" onclick="SessionMode.pauseSession()" style="display:none;">‖ PAUSE</button>
    <button id="btn-stop-session" class="session-btn danger" onclick="SessionMode.stopSession()" style="display:none;">■ STOP SESSION</button>
    <span id="session-mode-status" class="session-status-text">Loading…</span>
    <span class="spacer" style="flex:1;"></span>
    <label class="testmode-toggle" id="testmode-label">
      <input type="checkbox" id="testmode-checkbox" onchange="SessionMode.toggleTest(this.checked)"> TEST MODE
    </label>
  </div>

  <!-- FIX-C2 — MAX controls strip: pause + volume slider -->
  <div id="max-controls" style="flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 24px;background:#1e1a14;border-bottom:1px solid var(--border);">
    <button id="btn-max-pause" class="session-btn danger large" onclick="MaxControls.togglePause()" style="min-width:160px;">⏸ PAUSE MAX (5m)</button>
    <button class="session-btn muted" onclick="ackMaxDelivery()" style="padding:10px 18px;font-size:14px;" title="SPACEBAR also works">→ MAX NEXT</button>
    <button class="session-btn muted" onclick="MaxControls.testAudio()" style="padding:10px 14px;font-size:12px;" title="Dispatch a test Max audio event through the full browser path">🔊 TEST MAX</button>
    <span id="max-queue-count" style="font-family:monospace;font-size:11px;color:var(--text-dim);min-width:24px;text-align:center;" title="Max queue depth">0</span>
    <span id="max-pause-countdown" style="font-family:monospace;font-size:12px;color:var(--text-dim);min-width:90px;"></span>
    <!-- PHASE 6 — combat start button -->
    <button id="btn-combat" class="session-btn" onclick="CombatControls.toggle()" title="Start combat with every visible token on the active map">⚔ START COMBAT</button>
    <button id="btn-combat-next" class="session-btn muted" onclick="CombatControls.next()" style="display:none;">→ NEXT TURN</button>
    <span id="combat-status" style="font-family:monospace;font-size:12px;color:var(--text-dim);"></span>
    <span class="spacer" style="flex:1;"></span>
    <label style="display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.1em;color:var(--text-dim);">
      MAX VOLUME
      <input id="max-volume-slider" type="range" min="0" max="100" value="70" onchange="MaxControls.setVolume(this.value)" oninput="document.getElementById('max-volume-label').textContent=this.value+'%';" style="width:160px;accent-color:var(--gold);">
      <span id="max-volume-label" style="font-family:monospace;color:var(--gold);min-width:42px;text-align:right;">70%</span>
    </label>
  </div>

  <div id="status-bar">
    <div class="status-pill" id="pill-clock">
      <span class="dot"></span>
      <span id="clock-text">17:30 — Evening — Blizzard</span>
    </div>
    <div class="status-pill warm" id="pill-atmo">
      <span class="dot"></span>
      <span id="atmo-text">tavern_warm</span>
    </div>
    <div class="status-pill" id="pill-ai">
      <span class="dot"></span>
      <span id="ai-text">MAX —</span>
    </div>
    <div class="status-pill" id="pill-timer">
      <span class="dot"></span>
      <span id="timer-text">00:00:00</span>
    </div>
    <button id="panic-btn" onclick="panic()">⚠ PANIC</button>
  </div>

  <div id="max-input-bar">
    <button id="max-input-toggle" onclick="toggleMaxInput()">▲ ASK MAX</button>
    <div id="max-input-area">
      <input type="text" id="max-input" placeholder="Type a question for Max..." onkeydown="if(event.key==='Enter')sendMax()">
      <button id="max-send" onclick="sendMax()">SEND</button>
    </div>
  </div>

  <div id="whisper-bar" style="flex:0 0 auto;background:var(--surface);border-top:1px solid var(--border);">
    <button id="whisper-toggle" onclick="toggleWhisper()" style="width:100%;background:none;border:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.15em;padding:8px;cursor:pointer;">▲ NARRATOR WHISPER TO PLAYER</button>
    <div id="whisper-area" style="display:none;padding:12px 24px 16px;gap:8px;">
      <select id="whisper-target" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px;border-radius:4px;margin-right:8px;"></select>
      <input type="text" id="whisper-text" placeholder="Whispered to player..." style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;border-radius:4px;" onkeydown="if(event.key==='Enter')sendWhisper()">
      <button onclick="sendWhisper()" style="background:var(--gold);color:#000;border:none;font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:0.1em;padding:0 24px;border-radius:4px;cursor:pointer;">SEND</button>
    </div>
  </div>

  <div id="rest-bar">
    <button id="rest-toggle" onclick="toggleRest()">▲ REST</button>
    <div id="rest-area">
      <div class="rest-row">
        <div class="rest-section">
          <div class="rest-label">Players</div>
          <div id="rest-players"></div>
        </div>
        <div class="rest-section">
          <div class="rest-label">Environment</div>
          <label class="rest-env"><input type="radio" name="rest-env" value="safe" checked> Safe</label>
          <label class="rest-env"><input type="radio" name="rest-env" value="tense"> Tense</label>
        </div>
        <div class="rest-section">
          <div class="rest-label">Type</div>
          <button id="rest-short" onclick="confirmRest('short')">Short Rest (1h)</button>
          <button id="rest-long" onclick="confirmRest('long')">Long Rest (8h)</button>
        </div>
      </div>
    </div>
  </div>

</div>

<button id="atmo-trigger" onclick="document.getElementById('atmo-modal').classList.add('open')">OVERRIDE</button>
<div id="atmo-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div id="atmo-modal-content">
    <h3>Atmosphere Override</h3>
    <button onclick="setAtmo('tavern_warm')">SAFE</button>
    <button onclick="setAtmo('tavern_tense')">TENSION</button>
    <button onclick="setAtmo('dread_rising')">DREAD</button>
    <button onclick="setAtmo('revelation')">RITUAL</button>
    <button onclick="setAtmo('terror_peak')">SUPERNATURAL</button>
    <button onclick="setAtmo('combat')">COMBAT</button>
    <button class="cancel" onclick="document.getElementById('atmo-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// /dm — Center display: narrator status board
// Read-only during play. The DM glances, the AI directs.
// ═══════════════════════════════════════════════════════════════

var ws = null;
var whispers = [];
var timedEvents = [];
var sessionStartedAt = null;
var apiHealth = { status: 'OFFLINE', latency: null };
var gameTime = '17:30';
var weather = 'blizzard';
var currentAtmo = 'tavern_warm';

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function pad(n) { return String(n).padStart(2, '0'); }

function fmtTime(d) {
  var date = (d instanceof Date) ? d : new Date(d);
  return pad(date.getHours()) + ':' + pad(date.getMinutes());
}

function fmtGameTime(iso) {
  if (!iso) return '17:30';
  var d = new Date(iso);
  return pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
}

function fmtElapsed(ms) {
  var s = Math.max(0, Math.floor(ms / 1000));
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  return pad(h) + ':' + pad(m) + ':' + pad(sec);
}

function timeOfDayLabel(iso) {
  if (!iso) return 'Evening';
  var h = new Date(iso).getUTCHours();
  if (h < 5) return 'Night';
  if (h < 8) return 'Dawn';
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  if (h < 20) return 'Evening';
  return 'Night';
}

// ═══════════════════════════════════════════════════════════════
// WHISPER LOG
// ═══════════════════════════════════════════════════════════════
var TAG_MAP = {
  'max': 'MAX', 'hal': 'MAX', 'event': 'EVENT', 'story': 'EVENT',
  'combat': 'COMBAT', 'npc': 'NPC', 'mirror': 'MAX',
  'perception': 'PERCEPTION', 'system': 'SYSTEM',
  'atmosphere': 'EVENT', 'recap': 'MAX'
};
var TAG_CLASS = {
  'MAX': 'max', 'EVENT': 'event', 'COMBAT': 'combat',
  'NPC': 'npc', 'PERCEPTION': 'perception', 'SYSTEM': 'system'
};

function addWhisper(opts) {
  var entry = {
    time: opts.time || new Date(),
    tag: opts.tag || 'MAX',
    text: opts.text || '',
    id: 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6)
  };
  whispers.unshift(entry);
  if (whispers.length > 200) whispers.pop();
  renderWhispers(true);
}

function renderWhispers(animate) {
  var log = $('whisper-log');
  $('whisper-count').textContent = whispers.length + ' entries';
  log.innerHTML = whispers.map(function(w) {
    var cls = TAG_CLASS[w.tag] || 'system';
    return '<div class="whisper-entry' + (animate && w === whispers[0] ? ' unread' : '') + '" id="' + w.id + '">' +
      '<div class="whisper-time">' + fmtTime(w.time) + '</div>' +
      '<div class="whisper-tag ' + cls + '">[' + esc(w.tag) + ']</div>' +
      '<div class="whisper-text">' + esc(w.text) + '</div>' +
      '</div>';
  }).join('');
  log.scrollTop = 0;
  // Fade unread highlight after 10s
  if (animate && whispers.length) {
    var newest = whispers[0].id;
    setTimeout(function() {
      var el = document.getElementById(newest);
      if (el) el.classList.remove('unread');
    }, 10000);
  }
}

// ═══════════════════════════════════════════════════════════════
// CURRENT EVENT COUNTDOWN
// ═══════════════════════════════════════════════════════════════
var firingTimeout = null;

function refreshTimedEvents() {
  fetch('/api/world').then(function(r) { return r.json(); }).then(function(data) {
    timedEvents = ((data && data.timedEvents) || []).filter(function(e) {
      return e.gameTime && !e.fired;
    }).sort(function(a, b) { return new Date(a.gameTime) - new Date(b.gameTime); });
    updateEventStrip();
  }).catch(function() {});
}

function updateEventStrip() {
  if (firingTimeout) return; // hold "NOW FIRING" message
  var strip = $('event-strip');
  var textEl = $('event-strip-text');
  if (!timedEvents.length) {
    textEl.textContent = 'No upcoming events';
    strip.className = '';
    return;
  }
  var next = timedEvents[0];
  var nowGame = gameTime ? new Date('1274-10-15T' + gameTime + ':00Z') : new Date();
  var nextTime = new Date(next.gameTime);
  var deltaMs = nextTime - nowGame;
  if (deltaMs < 0) deltaMs = 0;

  var name = (next.description || next.id);
  textEl.textContent = 'Next: ' + name + '   ' + fmtElapsed(deltaMs);

  var minutes = deltaMs / 60000;
  strip.classList.remove('warning', 'urgent', 'firing');
  if (minutes <= 5) strip.classList.add('urgent');
  else if (minutes <= 30) strip.classList.add('warning');
}

function eventFired(eventId, name) {
  var strip = $('event-strip');
  var textEl = $('event-strip-text');
  strip.classList.remove('warning', 'urgent');
  strip.classList.add('firing');
  textEl.textContent = 'NOW FIRING: ' + (name || eventId);
  if (firingTimeout) clearTimeout(firingTimeout);
  firingTimeout = setTimeout(function() {
    firingTimeout = null;
    timedEvents = timedEvents.filter(function(e) { return e.id !== eventId; });
    refreshTimedEvents();
  }, 10000);
}

function updateStatusBar() {
  $('clock-text').textContent = gameTime + ' — ' + timeOfDayLabel('1274-10-15T' + gameTime + ':00') + ' — ' + (weather || 'Clear').toUpperCase();
  $('atmo-text').textContent = currentAtmo;

  // Nav strip update

    navClock.textContent = gameTime;
    $('nav-tod').textContent = timeOfDayLabel('1274-10-15T' + gameTime + ':00').toUpperCase();
    $('nav-weather').textContent = (weather || 'CLEAR').toUpperCase();
    var dot = $('nav-ai-dot'), label = $('nav-ai-text');
    if (dot) {
      dot.className = 'nav-dot ' + (apiHealth.status === 'ONLINE' ? 'online' : 'offline');
      label.textContent = 'AI ' + (apiHealth.status || '?');
    }
  }

  var atmoClasses = ['warm', 'tense', 'dread'];
  var pill = $('pill-atmo');
  pill.className = 'status-pill';

  else if (currentAtmo === 'tavern_tense' || currentAtmo === 'investigation') pill.classList.add('tense');
  else if (currentAtmo === 'dread_rising' || currentAtmo === 'terror_peak' || currentAtmo === 'combat' || currentAtmo === 'tavern_dark') pill.classList.add('dread');

  var ai = $('pill-ai');

    timerPill.classList.add('online');

function panic() {
  if (!confirm('PANIC — kill all effects, lights, audio?')) return;
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'panic' }));
  fetch('/api/panic', { method: 'POST' }).catch(function() {});
  addWhisper({ tag: 'SYSTEM', text: 'PANIC button pressed — all effects killed' });
}

function toggleMaxInput() {
  var area = $('max-input-area');
  area.classList.toggle('open');
  if (area.classList.contains('open')) $('max-input').focus();
}

var _maxLastFireAt = 0;
var _maxFiring = false;
function sendMax() {
  var input = $('max-input');
  var btn = $('max-send');
  var now = Date.now();
  // FIX-C3 — 3 second debounce + re-entry guard
  if (_maxFiring) return;
  if (now - _maxLastFireAt < 3000) return;
  var query = input.value.trim();
  if (!query) return;
  _maxFiring = true;
  _maxLastFireAt = now;
  input.value = '';
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  $('max-input-area').classList.remove('open');
  fetch('/api/max/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: query })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d && d.text) addWhisper({ tag: 'MAX', text: d.text });
    else if (d && d.response) addWhisper({ tag: 'MAX', text: d.response });
  }).catch(function() {}).then(function() {
    setTimeout(function() {
      _maxFiring = false;
      if (btn) { btn.disabled = false; btn.textContent = 'SEND'; }
    }, 3000);
  });
}

// ═══════════════════════════════════════════════════════════════
// SESSION MODE — Start Campaign / Start Session / Stop / Pause
// ═══════════════════════════════════════════════════════════════
var SessionMode = {
  mode: null,
  testMode: false,
  refresh: function() {
    return fetch('/api/session-mode').then(function(r) { return r.json(); }).then(function(d) {
      SessionMode.mode = d.mode;
      SessionMode.testMode = !!d.testMode;
      var startCamp = $('btn-start-campaign');
      var startSess = $('btn-start-session');
      var resumeSv = $('btn-resume-save');
      var pauseSe  = $('btn-pause-session');
      var stopSe   = $('btn-stop-session');
      var status   = $('session-mode-status');
      var tmCb     = $('testmode-checkbox');
      var tmLabel  = $('testmode-label');
      [startCamp, startSess, resumeSv, pauseSe, stopSe].forEach(function(b) { if (b) b.style.display = 'none'; });
      if (d.mode === 'pre-campaign') {
        if (startCamp) {
          startCamp.style.display = 'inline-block';
          if (!d.testMode) {
            startCamp.classList.add('disabled');
            startCamp.title = 'Enable Test Mode to practice — or accept the live campaign start';
          } else {
            startCamp.classList.remove('disabled');
            startCamp.title = 'Initialize the campaign';
          }
        }
      } else if (d.mode === 'between-session') {
        if (startSess) startSess.style.display = 'inline-block';
        if (resumeSv) {
          fetch('/api/session/saves').then(function(r) { return r.json(); }).then(function(saves) {
            if (saves && (saves.saves || saves).length) resumeSv.style.display = 'inline-block';
          }).catch(function() {});
        }
      } else if (d.mode === 'live-session') {
        if (pauseSe) pauseSe.style.display = 'inline-block';
        if (stopSe) stopSe.style.display = 'inline-block';
      }
      if (status) status.textContent = 'Mode: ' + d.mode + (d.testMode ? ' [TEST]' : '');
      if (tmCb) tmCb.checked = !!d.testMode;
      if (tmLabel) tmLabel.classList.toggle('active', !!d.testMode);
    }).catch(function() {});
  },
  startCampaign: function() {
    if ($('btn-start-campaign').classList.contains('disabled') && !SessionMode.testMode) {
      if (!confirm('Test Mode is OFF. This will START THE LIVE CAMPAIGN. Continue?')) return;
    }
    var typed = prompt('This will initialize The Dark Pilgrimage. The world clock will begin. This action cannot be undone. Type RESET to confirm:');
    if (typed !== 'RESET') return;
    fetch('/api/session/start-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ confirm: 'RESET' })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) addWhisper({ tag: 'SYSTEM', text: 'Campaign started — anchor ' + (d.anchor && d.anchor.gameDateTime || '?') });
      else alert('Failed: ' + (d.error || 'unknown'));
      SessionMode.refresh();
    });
  },
  startSession: function() {
    fetch('/api/session/start', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) addWhisper({ tag: 'SYSTEM', text: 'Session started — live mode active' });
      else alert('Failed: ' + (d.error || 'unknown'));
      SessionMode.refresh();
    });
  },
  resumeSave: function() {
    fetch('/api/session/resume-save', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      addWhisper({ tag: 'SYSTEM', text: 'Resumed save' });
      SessionMode.refresh();
    });
  },
  pauseSession: function() {
    fetch('/api/session/pause', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      addWhisper({ tag: 'SYSTEM', text: 'Session paused — clock frozen' });
      SessionMode.refresh();
    });
  },
  stopSession: function() {
    if (!confirm('End the session? Lights will return to home_normal over 30 seconds.')) return;
    fetch('/api/session/stop', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) addWhisper({ tag: 'SYSTEM', text: 'Session ended' });
      SessionMode.refresh();
    });
  },
  toggleTest: function(enabled) {
    fetch('/api/test-mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: !!enabled })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) alert(d.error);
      SessionMode.refresh();
    });
  }
};
window.SessionMode = SessionMode;
setTimeout(function() { SessionMode.refresh(); }, 500);
setInterval(function() { SessionMode.refresh(); }, 15000);

// ═══════════════════════════════════════════════════════════════
// MAX CONTROLS — pause + volume + earbud audio playback (FIX-C1/C2)
// ═══════════════════════════════════════════════════════════════
var MaxControls = {
  paused: false,
  pausedUntil: 0,
  volume: 0.7,
  _audio: null,
  _earbudSinkId: null,
  init: function() {
    // Earbud sink id is stored by the audio device tools (FIX-B5)
    try {
      var saved = JSON.parse(localStorage.getItem('codm.audioDevices.v1') || '{}');
      MaxControls._earbudSinkId = saved.earbud || localStorage.getItem('dp_earbud_output') || null;
    } catch (e) {}
    if (!MaxControls._earbudSinkId) {
      try {
        addWhisper({ tag: 'AUDIO', text: '⚠ No DM earbud saved — go to /dm/ref → Audio Devices → pick earbud → click "Save Audio Config" → then reload /dm. Max will play on the system default until then.' });
      } catch (x) {}
    }
    // Restore saved volume
    try {
      var v = parseFloat(localStorage.getItem('codm.maxVolume'));
      if (v >= 0 && v <= 1) {
        MaxControls.volume = v;
        var slider = $('max-volume-slider');
        if (slider) slider.value = Math.round(v * 100);
        var lbl = $('max-volume-label');
        if (lbl) lbl.textContent = Math.round(v * 100) + '%';
      }
    } catch (e) {}
    MaxControls.refresh();
  },
  refresh: function() {
    fetch('/api/max/status').then(function(r) { return r.json(); }).then(function(d) {
      MaxControls.paused = !!d.paused;
      MaxControls.pausedUntil = d.pausedUntil || 0;
      if (typeof d.volume === 'number') MaxControls.volume = d.volume;
      var qc = $('max-queue-count');
      if (qc && typeof d.queueLength === 'number') qc.textContent = String(d.queueLength);
      MaxControls._updateButton();
    }).catch(function() {});
  },
  togglePause: function() {
    if (MaxControls.paused) {
      fetch('/api/max/resume', { method: 'POST' }).then(function(r) { return r.json(); }).then(function() {
        MaxControls.paused = false;
        MaxControls.pausedUntil = 0;
        MaxControls._updateButton();
        addWhisper({ tag: 'SYSTEM', text: 'Max resumed' });
      });
    } else {
      fetch('/api/max/pause', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ durationSec: 300 })
      }).then(function(r) { return r.json(); }).then(function(d) {
        MaxControls.paused = true;
        MaxControls.pausedUntil = d.until || (Date.now() + 5 * 60 * 1000);
        MaxControls._updateButton();
        addWhisper({ tag: 'SYSTEM', text: 'Max paused for 5 minutes' });
      });
    }
  },
  setVolume: function(v) {
    var vol = Math.max(0, Math.min(1, parseFloat(v) / 100));
    MaxControls.volume = vol;
    try { localStorage.setItem('codm.maxVolume', String(vol)); } catch (e) {}
    if (MaxControls._audio) MaxControls._audio.volume = vol;
    fetch('/api/max/volume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volume: vol })
    }).catch(function() {});
  },
  _updateButton: function() {
    var btn = $('btn-max-pause');
    var cd = $('max-pause-countdown');
    if (!btn) return;
    if (MaxControls.paused) {
      btn.textContent = '▶ RESUME MAX';
      btn.classList.remove('danger');
      btn.classList.add('large');
      var remainMs = MaxControls.pausedUntil - Date.now();
      if (cd) {
        if (remainMs > 0) {
          var s = Math.ceil(remainMs / 1000);
          cd.textContent = 'paused (' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') + ')';
        } else {
          cd.textContent = 'paused';
        }
      }
    } else {
      btn.textContent = '⏸ PAUSE MAX (5m)';
      btn.classList.add('danger');
      if (cd) cd.textContent = '';
    }
  },
  // Re-read the earbud sink id from localStorage every time we need it. The
  // DM may save a new device in /dm/ref AUDIO DEVICES after /dm was already
  // open; without this MaxControls would play to the stale sink (often the
  // default speaker) and the DM hears nothing. Low cost — just a JSON parse.
  _reloadEarbudSink: function() {
    try {
      var saved = JSON.parse(localStorage.getItem('codm.audioDevices.v1') || '{}');
      var next = saved.earbud || localStorage.getItem('dp_earbud_output') || null;
      if (next !== MaxControls._earbudSinkId) {
        console.log('[MaxControls] earbud sink updated:', String(next || 'null').slice(0, 12));
        MaxControls._earbudSinkId = next;
      }
    } catch (e) {}
  },
  // FIX-C1 — handle max:audio events from voice-service
  handleMaxAudio: function(d) {
    if (!d || !d.url) {
      try { addWhisper({ tag: 'AUDIO', text: 'Max audio event ignored: no url in payload' }); } catch (x) {}
      return;
    }
    if (MaxControls.paused) { console.log('[MaxControls] paused — dropping audio'); return; }

    // Always re-read the earbud sink id in case it changed since page load.
    MaxControls._reloadEarbudSink();

    // Stop any previously-queued Max audio so successive whispers don't overlap
    if (MaxControls._audio) {
      try { MaxControls._audio.pause(); MaxControls._audio.src = ''; } catch (e) {}
    }
    var audio = new Audio(d.url);
    audio.volume = MaxControls.volume;
    var text = d.text || '';
    var url = d.url;
    var sinkUsed = 'default';
    var configuredSink = MaxControls._earbudSinkId;
    // Surface arrival in the whisper log so the DM can see the pipeline
    // reached the browser at all. AUDIO tag = browser audio diagnostics.
    try {
      addWhisper({
        tag: 'AUDIO',
        text: 'Max audio received: ' + (text ? '"' + text.slice(0, 40) + '" ' : '') +
              '→ ' + (configuredSink ? 'earbud ' + String(configuredSink).slice(0, 8) + '…' : 'DEFAULT (no earbud configured — save in /dm/ref Audio Devices + reload)')
      });
    } catch (x) {}

    var play = function() {
      audio.play().then(function() {
        console.log('[MaxControls] playing on', sinkUsed, '—', text.slice(0, 60));
        try { addWhisper({ tag: 'AUDIO', text: 'Max audio playing on ' + sinkUsed }); } catch (x) {}
      }).catch(function(e) {
        // Autoplay blocked, device gone, or other playback failure.
        // Fall back to speechSynthesis so Max stays audible rather than
        // silently vanishing. Surface in the whisper log so the DM sees it.
        console.warn('[MaxControls] audio play failed on', sinkUsed, ':', e.message, '— falling back to browser TTS');
        try {
          addWhisper({ tag: 'AUDIO', text: '⚠ Max audio play FAILED on ' + sinkUsed + ' — ' + e.message + ' — speechSynthesis fallback' });
        } catch (x) {}
        if (text) MaxControls.handleMaxFallback({ text: text });
      });
    };
    if (configuredSink && audio.setSinkId) {
      audio.setSinkId(configuredSink).then(function() {
        sinkUsed = 'earbud (' + String(configuredSink).slice(0, 8) + '…)';
        play();
      }).catch(function(err) {
        console.warn('[MaxControls] setSinkId failed (' + err.message + ') — using default sink');
        sinkUsed = 'default (setSinkId REJECTED: ' + err.message + ')';
        try {
          addWhisper({ tag: 'AUDIO', text: '⚠ Max earbud setSinkId rejected: ' + err.message + ' — falling through to default device' });
        } catch (x) {}
        play();
      });
    } else {
      sinkUsed = configuredSink ? 'default (browser has no setSinkId support)' : 'default (no earbud configured)';
      play();
    }
    MaxControls._audio = audio;
  },
  // Diagnostic — fire a test Max audio event using a pre-existing MP3 file
  // so the DM can verify the browser-side audio path independently of
  // ElevenLabs. Hits the server, which dispatches the normal max:audio WS
  // event back. Bypasses the max-director queue + throttle.
  testAudio: function() {
    MaxControls._reloadEarbudSink();
    try { addWhisper({ tag: 'AUDIO', text: 'Max test — reading earbud sink: ' + (MaxControls._earbudSinkId ? String(MaxControls._earbudSinkId).slice(0, 12) + '…' : 'NONE — configure in /dm/ref Audio Devices') }); } catch (x) {}
    fetch('/api/max/test-audio', { method: 'POST' }).then(function(r){return r.json();}).then(function(d) {
      if (!d.ok) addWhisper({ tag: 'AUDIO', text: 'Max test dispatch failed: ' + (d.error || 'unknown') });
    }).catch(function(e) { addWhisper({ tag: 'AUDIO', text: 'Max test request failed: ' + e.message }); });
  },
  // FIX-C1 — browser-TTS fallback when ElevenLabs is unavailable
  handleMaxFallback: function(d) {
    if (!d || !d.text) return;
    if (MaxControls.paused) return;
    if (!('speechSynthesis' in window)) return;
    var u = new SpeechSynthesisUtterance(d.text);
    u.volume = MaxControls.volume;
    u.rate = 1.05; u.pitch = 0.9;
    window.speechSynthesis.speak(u);
  }
};
window.MaxControls = MaxControls;
setTimeout(MaxControls.init, 600);
setInterval(function() { MaxControls._updateButton(); }, 1000);
setInterval(function() { MaxControls.refresh(); }, 15000);

// ═══════════════════════════════════════════════════════════════
// ROOM AUDIO — NPC public dialogue + ambient on the room speaker (FIX-D)
// ═══════════════════════════════════════════════════════════════
var RoomAudio = {
  _roomSinkId: null,
  _volume: 0.85,
  _audio: null,
  _ambientAudio: null,
  _ambientName: null,
  _ambientVolume: 0.5,
  init: function() {
    try {
      var saved = JSON.parse(localStorage.getItem('codm.audioDevices.v1') || '{}');
      RoomAudio._roomSinkId = saved.roomSpeaker || localStorage.getItem('dp_sfx_output') || null;
    } catch (e) {}
    try {
      var v = parseFloat(localStorage.getItem('codm.roomVolume'));
      if (v >= 0 && v <= 1) RoomAudio._volume = v;
    } catch (e) {}
  },
  // Play/swap the ambient bed on the room speaker. Loops indefinitely.
  // Called from atmo:profile_active when the profile declares audio.ambient.
  handleAmbient: function(name, volume) {
    if (!name) return;
    if (RoomAudio._ambientName === name && RoomAudio._ambientAudio && !RoomAudio._ambientAudio.paused) return;
    // Stop any previous ambient bed first
    if (RoomAudio._ambientAudio) {
      try { RoomAudio._ambientAudio.pause(); RoomAudio._ambientAudio.src = ''; } catch (e) {}
    }
    var url = '/sounds/' + String(name).replace(/\.mp3$/, '') + '.mp3';
    var a = new Audio(url);
    a.loop = true;
    a.volume = typeof volume === 'number' ? Math.max(0, Math.min(1, volume)) : RoomAudio._ambientVolume;
    RoomAudio._ambientAudio = a;
    RoomAudio._ambientName = name;
    var sinkLabel = 'default';
    var play = function() {
      a.play().then(function() {
        console.log('[RoomAudio] ambient playing on', sinkLabel, '—', name, 'vol', a.volume);
      }).catch(function(e) {
        console.warn('[RoomAudio] ambient play failed on', sinkLabel, ':', e.message);
        try { addWhisper({ tag: 'AUDIO', text: 'Ambient "' + name + '" play failed on ' + sinkLabel + ' (' + e.message + ')' }); } catch (x) {}
      });
    };
    if (RoomAudio._roomSinkId && a.setSinkId) {
      a.setSinkId(RoomAudio._roomSinkId).then(function() {
        sinkLabel = 'room (' + String(RoomAudio._roomSinkId).slice(0, 8) + '…)';
        play();
      }).catch(function(err) {
        sinkLabel = 'default (setSinkId rejected: ' + err.message + ')';
        play();
      });
    } else {
      sinkLabel = RoomAudio._roomSinkId ? 'default (no setSinkId support)' : 'default (no room sink configured)';
      play();
    }
  },
  stopAmbient: function() {
    if (RoomAudio._ambientAudio) {
      try { RoomAudio._ambientAudio.pause(); RoomAudio._ambientAudio.src = ''; } catch (e) {}
      RoomAudio._ambientAudio = null;
      RoomAudio._ambientName = null;
    }
  },
  setVolume: function(v) {
    RoomAudio._volume = Math.max(0, Math.min(1, parseFloat(v)));
    try { localStorage.setItem('codm.roomVolume', String(RoomAudio._volume)); } catch (e) {}
    if (RoomAudio._audio) RoomAudio._audio.volume = RoomAudio._volume;
  },
  // FIX-D — handle npc:audio events and play on the configured room sink
  handleNpcAudio: function(d) {
    if (!d || !d.url) return;
    // Stop any previously-playing NPC line so rapid dialogue doesn't overlap.
    // Mark it canceled so the pending setSinkId→play chain bails out
    // instead of calling play() on an audio element whose src we just
    // cleared — that was the source of "The element has no supported sources"
    // errors when two NPC lines dispatched back-to-back.
    if (RoomAudio._audio) {
      RoomAudio._audio.__rdCanceled = true;
      try { RoomAudio._audio.pause(); RoomAudio._audio.src = ''; } catch (e) {}
    }
    var audio = new Audio(d.url);
    audio.volume = RoomAudio._volume;
    var npcLabel = d.npc || 'NPC';
    var text = d.text || '';
    var sinkUsed = 'default';
    var play = function() {
      if (audio.__rdCanceled) return; // superseded by a later NPC line
      audio.play().then(function() {
        console.log('[RoomAudio] NPC playing on', sinkUsed, '—', npcLabel, ':', text.slice(0, 60));
      }).catch(function(e) {
        // If we were canceled by the next dispatch, don't warn or fall
        // back — the replacement line is already playing.
        if (audio.__rdCanceled) return;
        // Autoplay blocked or sink gone. Fall back to speechSynthesis so
        // the line is still audible, surface it in the whisper log so
        // the DM sees the fallback happened.
        console.warn('[RoomAudio] play failed on', sinkUsed, ':', e.message, '— speechSynthesis fallback');
        try { addWhisper({ tag: 'AUDIO', text: 'NPC audio (' + npcLabel + ') play failed on ' + sinkUsed + ' (' + e.message + ') — speechSynthesis fallback' }); } catch (x) {}
        if (text && 'speechSynthesis' in window) {
          var u = new SpeechSynthesisUtterance(text);
          u.volume = RoomAudio._volume;
          window.speechSynthesis.speak(u);
        }
      });
    };
    RoomAudio._audio = audio; // stored BEFORE async setSinkId so a later
                              // dispatch that arrives mid-chain can cancel us.
    if (RoomAudio._roomSinkId && audio.setSinkId) {
      audio.setSinkId(RoomAudio._roomSinkId).then(function() {
        sinkUsed = 'room (' + String(RoomAudio._roomSinkId).slice(0, 8) + '…)';
        play();
      }).catch(function(e) {
        console.warn('[RoomAudio] setSinkId failed:', e.message);
        sinkUsed = 'default (setSinkId rejected: ' + e.message + ')';
        play();
      });
    } else {
      sinkUsed = RoomAudio._roomSinkId ? 'default (no setSinkId support)' : 'default (no room sink configured)';
      play();
    }
    addWhisper({ tag: 'NPC', text: '[' + npcLabel + '] ' + text.slice(0, 80) });
  },
  // FIX-D — silent text-only fallback when ElevenLabs is unavailable,
  // and language-gated fallback: when the NPC is speaking a non-Common
  // language the room speaker should get indistinct speech so players
  // who don't speak it can't follow the dialogue even at the table.
  handleNpcFallback: function(d) {
    if (!d || !d.text) return;
    if (d.muffled) {
      // Log the routing tell for the DM's whisper feed.
      addWhisper({ tag: 'LANG', text: d.text });
      // Browser speechSynthesis is the closest approximation to muffled
      // speech we have on a bare-metal install. Use random phonetic
      // syllables so no listener can reconstruct the line from the
      // rhythm alone.
      if ('speechSynthesis' in window) {
        try {
          var gibb = RoomAudio._gibberishFor(d.text || '', d.languageId);
          var u = new SpeechSynthesisUtterance(gibb);
          u.volume = Math.max(0.25, (RoomAudio._volume || 0.85) * 0.55);
          u.rate = 0.9;
          u.pitch = 0.85;
          window.speechSynthesis.speak(u);
        } catch (e) { console.warn('[RoomAudio] muffled fallback failed:', e.message); }
      }
      return;
    }
    addWhisper({ tag: 'NPC', text: '[' + (d.npc || 'NPC') + ' silent] ' + d.text });
  },

  // Build a gibberish string of roughly the same syllable count as the
  // source text so the "muffled" muttering has the right cadence without
  // leaking any words.
  _gibberishFor: function(text, langId) {
    var PALETTES = {
      slovak:  ['pre','tro','sla','mni','vy','kry','do','ne','zra','chu','mi','ste','ho','lo','pa'],
      draconic:['kri','vo','sath','ixen','kyr','thur','uth','arax','vy','saur','kest','oth','rhy','mar'],
      orcish:  ['grak','mog','zug','rakh','mur','kaz','nog','thar','bruk','gor','urk'],
      undercommon:['zh','xu','vri','nesh','kyth','sul','dor','myl','quor'],
      default: ['mur','um','nth','vo','sha','el','mo','ra','li','ka','en','so','tur','po']
    };
    var pal = PALETTES[(langId || '').toLowerCase()] || PALETTES.default;
    var wordCount = Math.max(3, Math.min(20, Math.round((text || '').split(/\s+/).length * 0.7)));
    var out = [];
    for (var i = 0; i < wordCount; i++) {
      var syllables = 1 + Math.floor(Math.random() * 3);
      var w = '';
      for (var j = 0; j < syllables; j++) w += pal[Math.floor(Math.random() * pal.length)];
      out.push(w);
    }
    return out.join(' ');
  }
};
window.RoomAudio = RoomAudio;
setTimeout(RoomAudio.init, 600);

// ═══════════════════════════════════════════════════════════════
// COMBAT CONTROLS — PHASE 6
// ═══════════════════════════════════════════════════════════════
var CombatControls = {
  active: false,
  refresh: function() {
    fetch('/api/combat').then(function(r) { return r.json(); }).then(function(d) {
      CombatControls.active = !!(d && (d.active || d.combatActive));
      var btn = $('btn-combat');
      var nextBtn = $('btn-combat-next');
      var status = $('combat-status');
      if (CombatControls.active) {
        if (btn) { btn.textContent = '■ END COMBAT'; btn.classList.add('danger'); }
        if (nextBtn) nextBtn.style.display = 'inline-block';
        if (status) {
          var combatants = d.combatants || d.turnOrder || [];
          var curIdx = d.currentTurn || d.currentTurnIndex || 0;
          var cur = combatants[curIdx];
          status.textContent = 'Round ' + (d.round || 1) + ' · ' + (cur ? (cur.name || cur.id || '—') : '—');
        }
      } else {
        if (btn) { btn.textContent = '⚔ START COMBAT'; btn.classList.remove('danger'); }
        if (nextBtn) nextBtn.style.display = 'none';
        if (status) status.textContent = '';
      }
    }).catch(function() {});
  },
  toggle: function() {
    if (CombatControls.active) {
      if (!confirm('End combat?')) return;
      fetch('/api/combat/end', { method: 'POST' }).then(function() {
        addWhisper({ tag: 'COMBAT', text: 'Combat ended' });
        setTimeout(CombatControls.refresh, 200);
      });
    } else {
      fetch('/api/combat/start-scene', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
        if (d && d.ok) addWhisper({ tag: 'COMBAT', text: 'Combat started — ' + (d.combatantIds || []).length + ' combatants. Players, roll initiative.' });
        else if (d && d.error) addWhisper({ tag: 'COMBAT', text: 'Combat start failed: ' + d.error });
        setTimeout(CombatControls.refresh, 200);
      });
    }
  },
  next: function() {
    fetch('/api/combat/next', { method: 'POST' }).then(function() {
      setTimeout(CombatControls.refresh, 200);
    });
  }
};
window.CombatControls = CombatControls;
setTimeout(CombatControls.refresh, 800);
setInterval(CombatControls.refresh, 5000);

// Section 6 — Narrator whisper to specific player
function toggleWhisper() {
  var area = $('whisper-area');
  var open = area.style.display !== 'flex';
  area.style.display = open ? 'flex' : 'none';
  if (open) {
    loadWhisperPlayers();
    $('whisper-text').focus();
  }
}

function loadWhisperPlayers() {
  fetch('/api/state').then(function(r) { return r.json(); }).then(function(s) {
    var sel = $('whisper-target');
    var players = (s && s.players) || {};
    var html = '';
    for (var pid in players) {
      var p = players[pid];
      if (!p || p.absent || p.notYetArrived) continue;
      var name = (p.character && p.character.name) || pid;
      html += '<option value="' + pid + '">' + esc(name) + '</option>';
    }
    sel.innerHTML = html || '<option value="">No players</option>';
  });
}

function sendWhisper() {
  var pid = $('whisper-target').value;
  var text = $('whisper-text').value.trim();
  if (!pid || !text) return;
  fetch('/api/narrator/whisper', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ playerId: pid, text: text })
  });
  $('whisper-text').value = '';
  $('whisper-area').style.display = 'none';
  addWhisper({ tag: 'SYSTEM', text: 'Narrator → ' + pid + ': ' + text });
}

function setAtmo(profile) {
  fetch('/api/atmosphere/' + encodeURIComponent(profile), { method: 'POST' }).catch(function() {});
  currentAtmo = profile;
  updateStatusBar();
  document.getElementById('atmo-modal').classList.remove('open');
  addWhisper({ tag: 'EVENT', text: 'Atmosphere override → ' + profile });
}

// 528Hz ACK tone — plays on each Max delivery acknowledgment.
// Short sine burst with fast attack/release so it doesn't clash with narration.
// Routes through MaxControls._earbudSinkId via AudioContext.setSinkId so the
// tone goes to the DM earbud only, same as Max ElevenLabs audio.
var _maxAckAudioCtx = null;
function playMaxAckTone() {
  try {
    if (!_maxAckAudioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      _maxAckAudioCtx = new AC();
    }
    var ctx = _maxAckAudioCtx;
    if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }

    var doPlay = function() {
      try {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 528;
        var t = ctx.currentTime;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.20);
      } catch (e) { /* ignore */ }
    };

    // Route to DM earbud via setSinkId — same pattern as MaxControls.handleMaxAudio
    var earbudSink = window.MaxControls && MaxControls._earbudSinkId;
    if (earbudSink && typeof ctx.setSinkId === 'function' && ctx.sinkId !== earbudSink) {
      ctx.setSinkId(earbudSink).then(doPlay).catch(function() { doPlay(); });
    } else {
      doPlay();
    }
  } catch (e) { /* ignore — ack tone is cosmetic */ }
}

function ackMaxDelivery() {
  playMaxAckTone();
  fetch('/api/max/acknowledge', { method: 'POST' }).catch(function() {});
  var qEl = $('max-queue-count');
  if (qEl) { var n = parseInt(qEl.textContent || '0'); if (n > 0) qEl.textContent = String(n - 1); }
}

// Hotkey: ` to toggle Max input
// SPACEBAR: acknowledge Max delivery (advances queue + 528Hz tone)
window.addEventListener('keydown', function(e) {
  if (e.key === '`' || e.key === '~') {
    e.preventDefault();
    toggleMaxInput();
  }
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
    e.preventDefault();
    ackMaxDelivery();
  }
});

// ═══════════════════════════════════════════════════════════════
// REST PANEL — Rule 5
// ═══════════════════════════════════════════════════════════════
function toggleRest() {
  var area = $('rest-area');
  area.classList.toggle('open');
  if (area.classList.contains('open')) loadRestPlayers();
}

function loadRestPlayers() {
  fetch('/api/state').then(function(r) { return r.json(); }).then(function(s) {
    var players = (s && s.players) || {};
    var html = '';
    for (var pid in players) {
      var p = players[pid];
      if (!p || p.absent || p.notYetArrived) continue;
      var name = (p.character && p.character.name) || pid;
      html += '<label><input type="checkbox" class="rest-pid" value="' + esc(pid) + '" checked> ' + esc(name) + '</label>';
    }
    if (!html) html = '<div style="font-size:11px;color:var(--text-dimmer);font-style:italic;">No present players</div>';
    $('rest-players').innerHTML = html;
  }).catch(function() {});
}

function confirmRest(type) {
  var pids = Array.from(document.querySelectorAll('.rest-pid:checked')).map(function(cb) { return cb.value; });
  if (!pids.length) { alert('Select at least one player'); return; }
  var tense = document.querySelector('input[name="rest-env"]:checked').value === 'tense';
  var label = type === 'long' ? 'long rest (8h)' : 'short rest (1h)' + (tense ? ' [TENSE]' : '');
  if (!confirm('Apply ' + label + ' to ' + pids.length + ' player(s)?')) return;
  var url = type === 'long' ? '/api/stamina/party/long-rest' : '/api/stamina/party/short-rest';
  var body = type === 'long' ? { playerIds: pids } : { playerIds: pids, tense: tense };
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); }).then(function(d) {
    addWhisper({ tag: 'EVENT', text: (type === 'long' ? 'Long' : 'Short') + ' rest applied to ' + (d.count || pids.length) + ' player(s)' });
    $('rest-area').classList.remove('open');
  }).catch(function() {});
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET (PHASE 4B — single connection per page)
// ═══════════════════════════════════════════════════════════════
function connect() {
  // Reuse an existing open or connecting socket
  if (window._wsInitialized && ws && (ws.readyState === 0 || ws.readyState === 1)) return;
  window._wsInitialized = true;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() {
    addWhisper({ tag: 'SYSTEM', text: 'Connected to session' });
    refreshTimedEvents();
  };
  ws.onmessage = function(ev) {
    try { handleMsg(JSON.parse(ev.data)); } catch (err) { console.error(err); }
  };
  ws.onclose = function() {
    addWhisper({ tag: 'SYSTEM', text: 'Disconnected — reconnecting...' });
    window._wsInitialized = false;
    setTimeout(connect, 3000);
  };
}

function handleMsg(msg) {
  var t = msg.type || msg.event;
  if (!t) return;

  // FIX-C1 — Max audio plays on the DM earbud sink
  if (t === 'max:audio') {
    if (window.MaxControls) MaxControls.handleMaxAudio(msg.data || {});
    return;
  }
  if (t === 'max:audio:speak') {
    if (window.MaxControls) MaxControls.handleMaxFallback(msg.data || {});
    return;
  }
  // FIX-D — NPC public dialogue plays on the room speaker sink
  if (t === 'npc:audio') {
    if (window.RoomAudio) RoomAudio.handleNpcAudio(msg.data || {});
    return;
  }
  if (t === 'npc:audio:speak') {
    if (window.RoomAudio) RoomAudio.handleNpcFallback(msg.data || {});
    return;
  }
  if (t === 'max:pause_state') {
    if (msg.data) {
      MaxControls.paused = !!msg.data.paused;
      MaxControls.pausedUntil = msg.data.until || 0;
      MaxControls._updateButton();
    }
    return;
  }

  // Init payload
  if (t === 'init') {
    var s = (msg.state) || {};
    if (s.world && s.world.gameTime) gameTime = fmtGameTime(s.world.gameTime);
    if (s.world && s.world.weather && s.world.weather.type) weather = s.world.weather.type;
    if (s.atmosphere && s.atmosphere.currentProfile) currentAtmo = s.atmosphere.currentProfile;
    if (s.session && s.session.startedAt) sessionStartedAt = new Date(s.session.startedAt).getTime();
    updateStatusBar();
    return;
  }

  // Game state changes
  if (t === 'state:change') {
    var p = msg.data && msg.data.path;
    var v = msg.data && msg.data.value;
    if (p === 'world.gameTime') gameTime = fmtGameTime(v);
    if (p === 'world.weather' && v && v.type) weather = v.type;
    if (p === 'atmosphere.currentProfile') currentAtmo = v;
    if (p === 'session.startedAt') sessionStartedAt = v ? new Date(v).getTime() : null;
    if (p === 'session.status') {
      if (v === 'active' && !sessionStartedAt) sessionStartedAt = Date.now();
      if (v !== 'active') sessionStartedAt = null;
    }
    return;
  }

  // DM whisper — primary feed
  if (t === 'dm:whisper') {
    var d = msg.data || msg;
    var category = (d.category || d.source || 'max').toLowerCase();
    var tag = TAG_MAP[category] || 'MAX';
    addWhisper({ tag: tag, text: d.text || '' });
    return;
  }

  // Max/HAL responses
  if (t === 'hal:response' || t === 'max:response') {
    var r = msg.data || msg;
    if (r && r.response) addWhisper({ tag: 'MAX', text: r.response });
    return;
  }

  // NPC dialogue
  if (t === 'npc:approved' || t === 'ai:npc_dialogue') {
    var n = msg.data || msg;
    if (n && n.text) addWhisper({ tag: 'NPC', text: (n.npc || 'NPC') + ': ' + n.text });
    return;
  }

  // Timed event firing
  if (t === 'world:timed_event') {
    var ev = msg.data || msg;
    var name = (ev.data && ev.data.description) || ev.event || ev.id;
    addWhisper({ tag: 'EVENT', text: name });
    eventFired(ev.id, name);
    return;
  }

  // Combat events
  if (t.indexOf('combat:') === 0) {
    if (t === 'combat:started') addWhisper({ tag: 'COMBAT', text: 'Combat begins' });
    else if (t === 'combat:ended') addWhisper({ tag: 'COMBAT', text: 'Combat ends' });
    else if (t === 'combat:next_turn') {
      var c = msg.data || msg;
      var name2 = c.combatant && c.combatant.name;
      if (name2) addWhisper({ tag: 'COMBAT', text: name2 + "'s turn" });
    }
    return;
  }

  // Perception flash
  if (t === 'player:perception_flash') {
    var pf = msg.data || msg;
    addWhisper({ tag: 'PERCEPTION', text: (pf.playerId || '?') + ' perceived: ' + (pf.description || '') });
    return;
  }

  // Atmosphere changes
  if (t === 'atmo:profile_active' || t === 'atmo:change') {
    var a = msg.data || msg;
    if (a.profile) {
      currentAtmo = a.profile;
      addWhisper({ tag: 'EVENT', text: 'Atmosphere → ' + a.profile });
    }
    // Ambient bed — only atmo:profile_active carries the resolved audio block
    // (dispatched by atmosphere-engine after the profile is applied).
    if (t === 'atmo:profile_active' && a.audio && window.RoomAudio) {
      if (a.audio.ambient) {
        var vol = (a.audio.volume && typeof a.audio.volume.ambient === 'number') ? a.audio.volume.ambient : undefined;
        RoomAudio.handleAmbient(a.audio.ambient, vol);
      } else {
        RoomAudio.stopAmbient();
      }
    }
    return;
  }

  // AI health
  if (t === 'ai:health') {
    apiHealth.status = msg.data ? msg.data.status : msg.status;
    apiHealth.latency = msg.data ? msg.data.lastResponseMs : msg.lastResponseMs;
    return;
  }

  // Session lifecycle
  if (t === 'session:started') {
    sessionStartedAt = Date.now();
    addWhisper({ tag: 'SYSTEM', text: 'Session started' });
    refreshTimedEvents();
    return;
  }
  if (t === 'session:ended') {
    sessionStartedAt = null;
    addWhisper({ tag: 'SYSTEM', text: 'Session ended' });
    return;
  }
}

connect();
updateStatusBar();
</script>
