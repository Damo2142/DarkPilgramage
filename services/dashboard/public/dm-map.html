<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Source Sans 3', sans-serif;
      color: #c8b89a;
    }

    /* Nav strip — top of all DM displays */
    #nav-strip {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #0e0c0a;
      border-bottom: 1px solid #3a3028;
      font-size: 12px;
      height: 32px;
    }
    #nav-strip .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #706050;
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid transparent;
      border-radius: 3px;
    }
    #nav-strip .nav-link:hover { color: #b09070; }
    #nav-strip .nav-link.active {
      color: #f0c840;
      border-color: #3a3028;
      background: #242018;
    }
    #nav-strip .spacer { flex: 1; }
    #nav-strip .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      color: #b09070;
      font-size: 11px;
    }
    #nav-strip .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #706050;
    }
    #nav-strip .nav-dot.online { background: #6aaa6a; }
    #nav-strip .nav-dot.offline { background: #cc3020; }
    #nav-strip .nav-clock { color: #f0c840; font-weight: 600; }

    #map-wrap {
      position: fixed;
      top: 32px;
      left: 0;
      bottom: 0;
      right: 0;
      transition: right 0.3s ease;
    }
    #map-wrap.panel-open { right: 320px; }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

    /* Floating top-right toolbar (existing) */
    #floating-toolbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(20, 18, 16, 0.92);
      border: 1px solid #4a3a28;
      border-radius: 6px;
      padding: 6px;
      display: flex;
      gap: 4px;
      transition: opacity 0.4s ease, right 0.3s ease;
      opacity: 1;
    }
    #floating-toolbar.panel-open { right: 336px; }
    #floating-toolbar.hidden { opacity: 0; pointer-events: none; }
    #floating-toolbar button {
      background: #251f17;
      border: 1px solid #4a3a28;
      color: #e8c060;
      font-size: 11px;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
    }
    #floating-toolbar button:hover { background: #4a3a28; color: #fff; }
    #floating-toolbar button.active { background: #aa2a1a; color: #fff; }

    #status-line {
      position: fixed;
      bottom: 8px;
      left: 8px;
      z-index: 100;
      background: rgba(20, 18, 16, 0.85);
      border: 1px solid #2a2218;
      color: #c8b89a;
      padding: 4px 10px;
      font-size: 10px;
      font-family: monospace;
      border-radius: 3px;
      opacity: 0.6;
    }

    /* ── Slide-out controls panel (right edge) ── */
    #controls-tab {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      z-index: 200;
      background: #251f17;
      border: 1px solid #4a3a28;
      border-right: none;
      color: #e8c060;
      padding: 12px 6px;
      cursor: pointer;
      border-radius: 4px 0 0 4px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 1px;
      writing-mode: vertical-rl;
      transform-origin: center;
      transition: right 0.3s ease;
    }
    #controls-tab.panel-open { right: 320px; }
    #controls-tab:hover { background: #4a3a28; color: #fff; }

    #controls-panel {
      position: fixed;
      top: 0;
      right: -320px;
      bottom: 0;
      width: 320px;
      background: #141210;
      border-left: 1px solid #4a3a28;
      color: #c8b89a;
      overflow-y: auto;
      transition: right 0.3s ease;
      z-index: 150;
      padding: 12px;
      font-size: 11px;
    }
    #controls-panel.open { right: 0; }
    #controls-panel h2 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: #e8c060;
      margin: 14px 0 6px;
      border-bottom: 1px solid #4a3a28;
      padding-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #controls-panel h2:first-child { margin-top: 0; }
    #controls-panel select,
    #controls-panel button {
      width: 100%;
      background: #251f17;
      border: 1px solid #4a3a28;
      color: #c8b89a;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 11px;
      border-radius: 3px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    #controls-panel button.primary { background: #4a3a28; color: #e8c060; }
    #controls-panel button:hover { background: #382c1e; color: #fff; }
    #controls-panel button.danger { color: #d04040; }
    #controls-panel .row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    #controls-panel .row button { margin-bottom: 0; }
    #controls-panel label {
      display: block;
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
      margin-top: 6px;
    }
    #controls-panel input[type="range"] {
      width: 100%;
      accent-color: #c9a54e;
    }
    #controls-panel input[type="checkbox"] {
      accent-color: #c9a54e;
      vertical-align: middle;
    }
    .zone-row,
    .npc-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 0;
      border-bottom: 1px solid #2a2218;
      font-size: 10px;
    }
    .zone-row:last-child,
    .npc-row:last-child { border-bottom: none; }
    .zone-row .name,
    .npc-row .name { flex: 1; color: #e8d0a0; }
    .zone-row button,
    .npc-row button {
      width: auto;
      padding: 2px 6px;
      font-size: 9px;
      margin: 0;
    }
    .placement-mode-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #aa2a1a;
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 200;
      display: none;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
    .placement-mode-banner.active { display: block; }

    /* Right-click context menu */
    #ctx-menu {
      position: fixed;
      z-index: 300;
      background: #141210;
      border: 1px solid #4a3a28;
      border-radius: 4px;
      padding: 4px;
      font-size: 12px;
      display: none;
      min-width: 200px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    #ctx-menu.open { display: block; }
    #ctx-menu .ctx-item {
      padding: 8px 12px;
      color: #c8b89a;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'Source Sans 3', sans-serif;
    }
    #ctx-menu .ctx-item:hover { background: #4a3a28; color: #f0c840; }
    #ctx-menu .ctx-divider { height: 1px; background: #3a3028; margin: 4px 0; }
    #ctx-menu .ctx-header {
      padding: 6px 12px;
      color: #f0c840;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid #3a3028;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div id="nav-strip">
  <a href="/dm" class="nav-link">CENTER</a>
  <a href="/dm/map" class="nav-link active">MAP</a>
  <a href="/dm/ref" class="nav-link">REF</a>
  <a href="/dm/classic" class="nav-link" target="_blank" rel="noopener" title="Original full dashboard — opens in new tab">CLASSIC</a>
  <span class="spacer"></span>
  <span class="nav-status">
    <span class="nav-dot" id="nav-ai-dot"></span>
    <span id="nav-ai-text">AI ?</span>
  </span>
  <span class="nav-status">
    <span class="nav-clock" id="nav-clock">17:30</span>
    <span id="nav-tod">EVENING</span>
    <span id="nav-weather">BLIZZARD</span>
  </span>
</div>

<div id="map-wrap">
  <canvas id="map"></canvas>
</div>

<div id="floating-toolbar">
  <button id="btn-fog" onclick="DmMap.toggleFogMode()" title="Fog of war reveal tool">FOG</button>
  <button id="btn-tokens" onclick="DmMap.toggleTokenVis()" title="Toggle hidden token visibility" class="active">TOK</button>
  <button id="btn-grid" onclick="DmMap.toggleGrid()" title="Toggle grid" class="active">GRID</button>
  <button onclick="DmMap.resetView()" title="Reset view">RESET</button>
</div>

<div id="status-line">Connecting...</div>

<div id="controls-tab" onclick="DmMap.toggleControls()">CONTROLS ▶</div>

<div id="controls-panel">
  <h2>Scene</h2>
  <select id="scene-select"></select>
  <div class="row">
    <button class="primary" onclick="DmMap.loadSelectedScene()">Load Scene</button>
    <button onclick="DmMap.saveSceneState()">Save State</button>
  </div>

  <h2>Fog of War</h2>
  <div class="row">
    <button class="primary" onclick="DmMap.revealAll()">Reveal All</button>
    <button onclick="DmMap.hideAll()">Hide All</button>
  </div>
  <div id="zone-list"></div>

  <h2>Display</h2>
  <label>Token Size <span id="token-size-val">100%</span></label>
  <input type="range" id="token-size" min="50" max="200" value="100" oninput="DmMap.updateDisplay()">
  <label>Token Opacity <span id="token-opacity-val">100%</span></label>
  <input type="range" id="token-opacity" min="20" max="100" value="100" oninput="DmMap.updateDisplay()">
  <label><input type="checkbox" id="show-grid" checked onchange="DmMap.updateDisplay()"> Show Grid</label>
  <label>Grid Opacity <span id="grid-opacity-val">35%</span></label>
  <input type="range" id="grid-opacity" min="0" max="100" value="35" oninput="DmMap.updateDisplay()">

  <h2>NPC Tokens</h2>
  <div id="npc-list"></div>
</div>

<div class="placement-mode-banner" id="placement-banner">
  Click the map to place <span id="placement-name"></span>
</div>

<div id="ctx-menu"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// /dm/map — DM full-viewport map view
// Uses the original VTT token rendering style from index.html
// (HP ring, dread aura, fill color, label letter, name below).
// Slide-out right-edge controls panel for scene/fog/display/NPC management.
// ═══════════════════════════════════════════════════════════════
var DmMap = (function() {
  var ws = null;
  var mapData = null;
  var mapImage = null;
  var tokens = {};
  var walls = [];
  var fogRevealed = [];
  var animations = [];
  var allMaps = [];
  var npcsList = [];
  var playersState = {};

  // Display settings
  var displaySettings = {
    tokenSize: 1.0,
    tokenOpacity: 1.0,
    showGrid: true,
    gridOpacity: 0.35
  };

  var showHiddenTokens = true;
  var fogMode = false;
  var draggingToken = null;
  var dragOffset = { x: 0, y: 0 };
  var panning = false;
  var panStart = null;
  var placementNpcId = null;

  // Original VTT token colors
  var colors = {
    pc: '#4080c0',
    npc: '#c9a54e',
    hidden: '#a03030',
    hpGreen: '#30a050',
    hpOrange: '#c07030',
    hpRed: '#d04040',
    grid: 'rgba(255,255,255,0.35)',
    selection: '#c9a54e'
  };

  var cam = { x: 0, y: 0, zoom: 1 };
  var canvas = document.getElementById('map');
  var ctx = canvas.getContext('2d');
  var statusLine = document.getElementById('status-line');
  var toolbar = document.getElementById('floating-toolbar');
  var controlsTab = document.getElementById('controls-tab');
  var controlsPanel = document.getElementById('controls-panel');
  var mapWrap = document.getElementById('map-wrap');
  var toolbarHideTimer = null;

  function setStatus(text) { statusLine.textContent = text; }

  function resize() {
    var rect = mapWrap.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    centerCamera();
    render();
  }

  function centerCamera() {
    if (!mapData) return;
    cam.x = 0; cam.y = 0;
    cam.zoom = Math.min(canvas.width / mapData.width, canvas.height / mapData.height) * 0.9;
  }

  function connect() {
    // PHASE 4B — single WS per page
    if (window._wsInitialized && ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    window._wsInitialized = true;
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host);
    ws.onopen = function() { setStatus('Connected'); loadMapsList(); loadNpcsList(); };
    ws.onmessage = function(e) {
      try { handleMsg(JSON.parse(e.data)); } catch (err) { console.error('[DmMap]', err); }
    };
    ws.onclose = function() { setStatus('Disconnected — reconnecting...'); window._wsInitialized = false; setTimeout(connect, 3000); };
  }

  function handleMsg(msg) {
    var t = msg.type || msg.event;
    switch (t) {
      case 'init': {
        var s = msg.state || {};
        if (s.map) {
          mapData = s.map;
          tokens = s.map.tokens || {};
          walls = s.map.walls || [];
          fogRevealed = s.map.fogRevealed || [];
          loadMapImage();
          renderZoneList();
        }
        if (s.players) playersState = s.players;
        render();
        break;
      }
      case 'state:change': {
        var p = msg.data && msg.data.path;
        var v = msg.data && msg.data.value;
        if (p === 'map.tokens') { tokens = v || {}; render(); }
        if (p && p.indexOf('map.tokens.') === 0) {
          var parts = p.split('.');
          if (parts.length === 3) tokens[parts[2]] = v;
          else if (parts.length > 3) {
            if (!tokens[parts[2]]) tokens[parts[2]] = {};
            tokens[parts[2]][parts[3]] = v;
          }
          render();
        }
        if (p === 'map.fogRevealed') { fogRevealed = v || []; render(); }
        if (p === 'map.walls') { walls = v || []; render(); }
        if (p && p.indexOf('players.') === 0) {
          var pidParts = p.split('.');
          var pid = pidParts[1];
          if (!playersState[pid]) playersState[pid] = {};
          if (pidParts.length === 2) playersState[pid] = v;
        }
        break;
      }
      case 'map:activated':
      case 'map:full_update': {
        if (msg.data && msg.data.map) {
          mapData = msg.data.map;
          tokens = msg.data.tokens || msg.data.map.tokens || {};
          walls = msg.data.map.walls || [];
          fogRevealed = msg.data.map.fogRevealed || [];
          loadMapImage();
          renderZoneList();
        }
        render();
        break;
      }
      case 'map:token_moved': {
        var d = msg.data || {};
        if (d.tokenId && tokens[d.tokenId]) {
          if (d.duration && d.duration > 0) startAnimation(d.tokenId, d.x, d.y, d.duration);
          else { tokens[d.tokenId].x = d.x; tokens[d.tokenId].y = d.y; render(); }
        }
        break;
      }
      case 'token:move': {
        var d2 = msg.data || {};
        if (d2.entityId && tokens[d2.entityId] && d2.to) {
          startAnimation(d2.entityId, d2.to.x, d2.to.y, d2.duration || 600);
        }
        break;
      }
      case 'map:token_added': {
        if (msg.data && msg.data.tokenId && msg.data.token) { tokens[msg.data.tokenId] = msg.data.token; render(); }
        break;
      }
      case 'map:token_removed': {
        if (msg.data && msg.data.tokenId) { delete tokens[msg.data.tokenId]; render(); }
        break;
      }
    }
  }

  function loadMapImage() {
    if (!mapData || !mapData.image) return;
    var img = new Image();
    img.onload = function() { mapImage = img; centerCamera(); render(); };
    img.onerror = function() { mapImage = null; render(); };
    img.src = '/assets/maps/' + mapData.image;
  }

  // ── Animation ──
  function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

  function startAnimation(tokenId, toX, toY, duration) {
    var tok = tokens[tokenId];
    if (!tok) return;
    animations = animations.filter(function(a) { return a.tokenId !== tokenId; });
    animations.push({
      tokenId: tokenId, fromX: tok.x, fromY: tok.y, toX: toX, toY: toY,
      startTime: performance.now(), duration: duration,
      onComplete: function() { tokens[tokenId].x = toX; tokens[tokenId].y = toY; }
    });
    requestAnimationFrame(animLoop);
  }

  function animLoop(now) {
    if (!animations.length) { render(); return; }
    var stillAnimating = false;
    for (var i = 0; i < animations.length; i++) {
      var a = animations[i];
      var t = Math.min(1, (now - a.startTime) / a.duration);
      if (t >= 1) { if (a.onComplete && !a._completed) { a.onComplete(); a._completed = true; } }
      else { stillAnimating = true; }
    }
    animations = animations.filter(function(a) { return !a._completed; });
    render();
    if (stillAnimating || animations.length) requestAnimationFrame(animLoop);
  }

  function getTokenRenderPos(id, tok) {
    var anim = null;
    for (var i = 0; i < animations.length; i++) if (animations[i].tokenId === id) { anim = animations[i]; break; }
    if (anim) {
      var t = Math.min(1, (performance.now() - anim.startTime) / anim.duration);
      var eased = easeInOut(t);
      return { x: anim.fromX + (anim.toX - anim.fromX) * eased, y: anim.fromY + (anim.toY - anim.fromY) * eased };
    }
    return { x: tok.x, y: tok.y };
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER — original VTT style from index.html
  // ═══════════════════════════════════════════════════════════════
  function render() {
    var W = canvas.width;
    var H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);
    if (!mapData) return;

    ctx.save();
    ctx.translate(W / 2 + cam.x, H / 2 + cam.y);
    ctx.scale(cam.zoom, cam.zoom);

    var mw = mapData.width;
    var mh = mapData.height;

    if (mapImage) {
      ctx.drawImage(mapImage, -mw / 2, -mh / 2, mw, mh);
    } else {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(-mw / 2, -mh / 2, mw, mh);
    }

    var gs = mapData.gridSize || 64;
    if (displaySettings.showGrid) {
      ctx.strokeStyle = 'rgba(255,255,255,' + displaySettings.gridOpacity + ')';
      ctx.lineWidth = 1;
      for (var x = 0; x <= mw; x += gs) {
        ctx.beginPath(); ctx.moveTo(x - mw/2, -mh/2); ctx.lineTo(x - mw/2, mh/2); ctx.stroke();
      }
      for (var y = 0; y <= mh; y += gs) {
        ctx.beginPath(); ctx.moveTo(-mw/2, y - mh/2); ctx.lineTo(mw/2, y - mh/2); ctx.stroke();
      }
    }

    // Zones (DM reference)
    if (mapData.zones) {
      for (var zi = 0; zi < mapData.zones.length; zi++) {
        var zone = mapData.zones[zi];
        ctx.strokeStyle = 'rgba(80,120,200,0.25)';
        ctx.lineWidth = 1;
        if (zone.points && zone.points.length >= 3) {
          ctx.beginPath();
          ctx.moveTo(zone.points[0].x - mw/2, zone.points[0].y - mh/2);
          for (var pi = 1; pi < zone.points.length; pi++) ctx.lineTo(zone.points[pi].x - mw/2, zone.points[pi].y - mh/2);
          ctx.closePath();
          ctx.stroke();
        } else if (zone.x != null && zone.w != null) {
          ctx.strokeRect(zone.x - mw/2, zone.y - mh/2, zone.w, zone.h);
        }
        // Zone label
        if (zone.name) {
          var lx, ly;
          if (zone.points && zone.points.length >= 3) {
            var sx = 0, sy = 0;
            for (var pp = 0; pp < zone.points.length; pp++) { sx += zone.points[pp].x; sy += zone.points[pp].y; }
            lx = sx / zone.points.length - mw/2;
            ly = sy / zone.points.length - mh/2;
          } else {
            lx = zone.x - mw/2 + (zone.w || 0)/2;
            ly = zone.y - mh/2 + (zone.h || 0)/2;
          }
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.strokeStyle = 'rgba(0,0,0,0.7)';
          ctx.font = 'bold 14px Source Sans 3, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.lineWidth = 3;
          ctx.strokeText(zone.name, lx, ly);
          ctx.fillText(zone.name, lx, ly);
        }
      }
    }

    // Walls (typed with colors)
    if (walls && walls.length) {
      ctx.lineCap = 'round';
      for (var wi = 0; wi < walls.length; wi++) {
        var w = walls[wi];
        var wtype = w.type || 'wall';
        var wx1 = w.x1 - mw/2, wy1 = w.y1 - mh/2, wx2 = w.x2 - mw/2, wy2 = w.y2 - mh/2;
        if (wtype === 'door') {
          ctx.strokeStyle = w.open ? 'rgba(100,180,80,0.6)' : 'rgba(184,134,11,0.8)';
          ctx.lineWidth = 4;
          if (w.open) ctx.setLineDash([4, 6]); else ctx.setLineDash([]);
          ctx.beginPath(); ctx.moveTo(wx1, wy1); ctx.lineTo(wx2, wy2); ctx.stroke();
          ctx.setLineDash([]);
        } else if (wtype === 'window') {
          ctx.strokeStyle = 'rgba(64,128,200,0.8)';
          ctx.lineWidth = 2;
          ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(wx1, wy1); ctx.lineTo(wx2, wy2); ctx.stroke();
          ctx.setLineDash([]);
        } else {
          ctx.strokeStyle = 'rgba(220,40,40,0.7)';
          ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(wx1, wy1); ctx.lineTo(wx2, wy2); ctx.stroke();
        }
      }
    }

    // Tokens — original VTT style
    for (var id in tokens) {
      var tok = tokens[id];
      if (tok.hidden && !showHiddenTokens) continue;
      _renderToken(id, tok, mw, mh);
    }

    ctx.restore();
  }

  function _renderToken(id, tok, mw, mh) {
    var gs = mapData.gridSize;
    var pos = getTokenRenderPos(id, tok);
    var x = pos.x - mw / 2;
    var y = pos.y - mh / 2;
    var r = gs * 0.4 * displaySettings.tokenSize;

    ctx.save();
    ctx.globalAlpha = displaySettings.tokenOpacity;

    // Dread aura for PCs
    if (tok.type === 'pc') {
      var dread = (playersState[id] && playersState[id].dread && playersState[id].dread.score) || 0;
      if (dread > 20) {
        var auraR = r + 4 + (dread / 100) * 12;
        var grad = ctx.createRadialGradient(x, y, r, x, y, auraR);
        var intensity = Math.min(dread / 100, 1);
        grad.addColorStop(0, 'rgba(' + Math.round(120 + 80*intensity) + ',30,' + Math.round(120 - 80*intensity) + ',' + (0.2 + intensity * 0.3) + ')');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI*2); ctx.fill();
      }
    }

    // HP ring
    var hp = tok.hp || { current: 1, max: 1 };
    var hpPct = Math.max(0, hp.current / (hp.max || 1));
    var ringR = r + 3;
    ctx.beginPath(); ctx.arc(x, y, ringR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(60,60,70,0.6)'; ctx.lineWidth = 3; ctx.stroke();
    if (hpPct > 0) {
      var hpColor = hpPct > 0.5 ? colors.hpGreen : hpPct > 0.25 ? colors.hpOrange : colors.hpRed;
      ctx.beginPath();
      ctx.arc(x, y, ringR, -Math.PI/2, -Math.PI/2 + Math.PI*2*hpPct);
      ctx.strokeStyle = hpColor; ctx.lineWidth = 3; ctx.stroke();
    }

    // Token circle
    var isHidden = tok.hidden;
    var fillColor = tok.type === 'pc' ? colors.pc : isHidden ? colors.hidden : colors.npc;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = fillColor; ctx.fill();

    // Hidden indicator overlay
    if (isHidden) {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,48,48,0.3)'; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = (r*0.7) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('👁', x, y);
    } else {
      // Token label (first letter)
      var label = (tok.name || id).charAt(0).toUpperCase();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (r*0.9) + 'px Cinzel, serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, x, y);
    }

    // Facing arrow
    if (tok.facing != null) {
      var fAngle = tok.facing;
      var arrowLen = r * 0.5;
      var arrowX = x + Math.cos(fAngle) * r;
      var arrowY = y + Math.sin(fAngle) * r;
      ctx.save();
      ctx.translate(arrowX, arrowY);
      ctx.rotate(fAngle);
      ctx.beginPath();
      ctx.moveTo(arrowLen * 0.5, 0);
      ctx.lineTo(-arrowLen * 0.3, -arrowLen * 0.35);
      ctx.lineTo(-arrowLen * 0.3, arrowLen * 0.35);
      ctx.closePath();
      ctx.fillStyle = tok.type === 'pc' ? '#c9a54e' : '#e0c060';
      ctx.fill();
      ctx.restore();
    }

    // Name label below
    var nameSizePx = Math.max(2, gs * 0.10);
    var nameText = tok.name || id;
    ctx.font = 'bold ' + nameSizePx + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.lineWidth = Math.max(1, nameSizePx * 0.25);
    ctx.lineJoin = 'round';
    ctx.strokeText(nameText, x, y + r + nameSizePx * 0.8);
    ctx.fillStyle = isHidden ? '#e06060' : '#f0f0f0';
    ctx.fillText(nameText, x, y + r + nameSizePx * 0.8);

    ctx.restore();
  }

  // ── Mouse interaction ──
  function screenToMap(sx, sy) {
    if (!mapData) return { x: 0, y: 0 };
    var W = canvas.width;
    var H = canvas.height;
    var mx = ((sx - W/2 - cam.x) / cam.zoom) + mapData.width/2;
    var my = ((sy - H/2 - cam.y) / cam.zoom) + mapData.height/2;
    return { x: mx, y: my };
  }

  function findTokenAt(sx, sy) {
    if (!mapData) return null;
    var pos = screenToMap(sx, sy);
    var gs = mapData.gridSize;
    var hitR = gs * 0.45 * displaySettings.tokenSize;
    var ids = Object.keys(tokens);
    for (var i = ids.length - 1; i >= 0; i--) {
      var id = ids[i];
      var tok = tokens[id];
      var dx = pos.x - tok.x;
      var dy = pos.y - tok.y;
      if (dx*dx + dy*dy < hitR*hitR) return { id: id, token: tok };
    }
    return null;
  }

  canvas.addEventListener('mousedown', function(ev) {
    showToolbar();
    var rect = canvas.getBoundingClientRect();
    var sx = ev.clientX - rect.left;
    var sy = ev.clientY - rect.top;

    // Placement mode
    if (placementNpcId) {
      var pos = screenToMap(sx, sy);
      placeNpcOnMap(placementNpcId, pos.x, pos.y);
      return;
    }

    if (ev.button === 0) {
      var hit = findTokenAt(sx, sy);
      if (hit) {
        draggingToken = hit;
        var pos2 = screenToMap(sx, sy);
        dragOffset = { x: pos2.x - hit.token.x, y: pos2.y - hit.token.y };
      } else {
        panning = true;
        panStart = { x: ev.clientX, y: ev.clientY, camX: cam.x, camY: cam.y };
      }
    } else if (ev.button === 1 || ev.button === 2 || ev.shiftKey) {
      panning = true;
      panStart = { x: ev.clientX, y: ev.clientY, camX: cam.x, camY: cam.y };
    }
  });

  canvas.addEventListener('mousemove', function(ev) {
    showToolbar();
    if (draggingToken) {
      var rect = canvas.getBoundingClientRect();
      var pos = screenToMap(ev.clientX - rect.left, ev.clientY - rect.top);
      tokens[draggingToken.id].x = pos.x - dragOffset.x;
      tokens[draggingToken.id].y = pos.y - dragOffset.y;
      render();
    } else if (panning && panStart) {
      cam.x = panStart.camX + (ev.clientX - panStart.x);
      cam.y = panStart.camY + (ev.clientY - panStart.y);
      render();
    }
  });

  canvas.addEventListener('mouseup', function(ev) {
    if (draggingToken && draggingToken !== '__pan') {
      fetch('/api/map/token/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenId: draggingToken.id, x: tokens[draggingToken.id].x, y: tokens[draggingToken.id].y, force: true })
      }).catch(function(){});
    }
    draggingToken = null;
    panning = false;
    panStart = null;
  });

  canvas.addEventListener('contextmenu', function(ev) {
    ev.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var sx = ev.clientX - rect.left;
    var sy = ev.clientY - rect.top;
    var hit = findTokenAt(sx, sy);
    if (hit) {
      showContextMenu(ev.clientX, ev.clientY, hit.id, hit.token);
    } else {
      hideContextMenu();
    }
  });

  function showContextMenu(x, y, tokenId, tok) {
    var menu = document.getElementById('ctx-menu');
    var isPlayer = tok.type === 'pc' || tok.isPC;
    var nameRevealed = !!tok.nameRevealedToPlayers;
    var tokenRevealed = !!tok.revealedToPlayers || isPlayer;
    var publicName = tok.publicName || (isPlayer ? tok.name : '');

    var html = '<div class="ctx-header">' + (tok.name || tokenId) + '</div>';
    if (!isPlayer) {
      html += '<div class="ctx-item" onclick="DmMap.ctxRevealToken(\'' + tokenId + '\',' + !tokenRevealed + ')">' +
        (tokenRevealed ? '✓ Hide Token from Players' : '○ Reveal Token to Players') + '</div>';
    }
    html += '<div class="ctx-item" onclick="DmMap.ctxRevealName(\'' + tokenId + '\',' + !nameRevealed + ')">' +
      (nameRevealed ? '✓ Hide Name from Players' : '○ Reveal Name to Players') + '</div>';
    if (!isPlayer) {
      html += '<div class="ctx-item" onclick="DmMap.ctxSetPublicName(\'' + tokenId + '\')">' +
        '✎ Set Public Name' + (publicName ? ' (' + publicName + ')' : '') + '</div>';
    }
    html += '<div class="ctx-divider"></div>';
    html += '<div class="ctx-item" onclick="DmMap.ctxClose()">Cancel</div>';
    menu.innerHTML = html;
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.classList.add('open');
  }

  function hideContextMenu() {
    var menu = document.getElementById('ctx-menu');
    if (menu) menu.classList.remove('open');
  }
  document.addEventListener('click', hideContextMenu);

  canvas.addEventListener('wheel', function(ev) {
    ev.preventDefault();
    showToolbar();
    var delta = ev.deltaY > 0 ? 0.9 : 1.1;
    cam.zoom *= delta;
    cam.zoom = Math.max(0.1, Math.min(5, cam.zoom));
    render();
  }, { passive: false });

  function updateDisplay() {
    displaySettings.tokenSize = document.getElementById('token-size').value / 100;
    displaySettings.tokenOpacity = document.getElementById('token-opacity').value / 100;
    displaySettings.showGrid = document.getElementById('show-grid').checked;

    document.getElementById('token-opacity-val').textContent = document.getElementById('token-opacity').value + '%';
    document.getElementById('grid-opacity-val').textContent = document.getElementById('grid-opacity').value + '%';

  function loadNpcsList() {
    // Pull NPCs from state, session-config, AND map npc-defaults so the panel
    // shows EVERY NPC defined for the active map plus any from session-0.
    Promise.all([
      fetch('/api/state').then(function(r) { return r.json(); }),
      fetch('/api/session-config').then(function(r) { return r.json(); }).catch(function() { return {}; }),
      fetch('/api/map/npc-defaults').then(function(r) { return r.json(); }).catch(function() { return { defaults: [] }; })
    ]).then(function(results) {
      var data = results[0];
      var cfg = results[1] || {};
      var npcDefaults = (results[2] && results[2].defaults) || [];
      var npcs = (data.state && data.state.npcs) || data.npcs || {};
      var seen = {};
      npcsList = [];
      // Merge in this order: state.npcs → patron-* config → map npc-defaults
      for (var k in npcs) {
        if (npcs[k] && npcs[k].name) {
          npcsList.push({ id: k, name: npcs[k].name, hidden: !!npcs[k].hidden });
          seen[k] = true;
        }
      }
      for (var ck in cfg) {
        if (!ck.startsWith('patron-')) continue;
        if (seen[ck]) continue;
        var p = cfg[ck];
        if (p && typeof p === 'object' && p.name) {
          npcsList.push({ id: ck, name: p.name, hidden: false });
          seen[ck] = true;
        }
      }
      // FIX-B3 — also include any NPC default that doesn't already have an
      // entry in state.npcs / config. Index by actorSlug.
      for (var di = 0; di < npcDefaults.length; di++) {
        var d = npcDefaults[di];
        var slug = d.actorSlug || d.tokenId;
        if (seen[slug]) continue;
        npcsList.push({ id: slug, name: d.name || slug, hidden: false });
        seen[slug] = true;
      }
      renderNpcList();
    }).catch(function(){});
  }

  function _findTokenForNpc(npcId) {
    // Direct id match
    if (tokens[npcId]) return tokens[npcId];
    // Search by actorSlug (map files use uniquified ids like patron-farmer-mmmq6srj2)
    for (var tid in tokens) {
      var t = tokens[tid];
      if (t && (t.actorSlug === npcId || t.npcId === npcId)) return t;
    }
    return null;
  }

  function renderNpcList() {
    var el = document.getElementById('npc-list');
    if (!el) return;
    if (!npcsList.length) { el.innerHTML = '<div style="font-size:9px;color:#666;padding:4px 0;">No NPCs loaded</div>'; return; }
    el.innerHTML = npcsList.map(function(n) {
      var tok = _findTokenForNpc(n.id);
      var onMap = !!tok;
      var revealedToPlayers = !!(tok && tok.revealedToPlayers);
      var posIndicator = onMap ? '●' : '○';
      var posColor = onMap ? '#7fb069' : '#666';
      var revealColor = revealedToPlayers ? '#7fb069' : '#666';
      var revealLabel = revealedToPlayers ? '👁 P' : '✕ P';
      return '<div class="npc-row">' +
        '<span style="color:' + posColor + ';">' + posIndicator + '</span>' +
        '<span class="name">' + esc(n.name) + '</span>' +
        '<button onclick="DmMap.startPlace(\'' + n.id + '\')">' + (onMap ? 'Move' : 'Place') + '</button>' +
        '<button onclick="DmMap.toggleNpcVisibility(\'' + n.id + '\')">' + (n.hidden || (tok && tok.hidden) ? 'Show' : 'Hide') + '</button>' +
        '<button onclick="DmMap.toggleRevealToPlayers(\'' + n.id + '\')" style="color:' + revealColor + ';" title="Reveal to players on /table">' + revealLabel + '</button>' +
        '</div>';
    }).join('');
  }

  function toggleRevealToPlayers(npcId) {
    var tok = tokens[npcId];
    if (!tok) return;
    var newRevealed = !tok.revealedToPlayers;
    fetch('/api/map/token/reveal-to-players', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tokenId: npcId, revealed: newRevealed })
    }).catch(function(){});
    tok.revealedToPlayers = newRevealed;
    setTimeout(loadNpcsList, 200);
    render();
  }

  function startPlace(npcId) {
    // FIX-B3 — first try one-click placement at the NPC's default starting
    // position. Falls back to manual placement (click on map) if no default
    // is registered for this NPC, or if the NPC is already placed (Move).
    var existingTok = _findTokenForNpc(npcId);
    if (existingTok) {
      // Already on map — fall through to manual move flow
      placementNpcId = npcId;
      var npcM = npcsList.find(function(n) { return n.id === npcId; });
      document.getElementById('placement-name').textContent = npcM ? npcM.name : npcId;
      document.getElementById('placement-banner').classList.add('active');
      return;
    }
    fetch('/api/map/npc/place-default', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ actorSlug: npcId })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d && (d.tokenId || d.alreadyPlaced)) {
        setTimeout(loadNpcsList, 200);
        return;
      }
      // No default position — fall back to manual placement
      placementNpcId = npcId;
      var npc = npcsList.find(function(n) { return n.id === npcId; });
      document.getElementById('placement-name').textContent = npc ? npc.name : npcId;
      document.getElementById('placement-banner').classList.add('active');
    }).catch(function() {
      placementNpcId = npcId;
      var npc2 = npcsList.find(function(n) { return n.id === npcId; });
      document.getElementById('placement-name').textContent = npc2 ? npc2.name : npcId;
      document.getElementById('placement-banner').classList.add('active');
    });
  }

  function placeNpcOnMap(npcId, x, y) {
    var existing = tokens[npcId];
    if (existing) {
      // Move existing token
      fetch('/api/map/token/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenId: npcId, x: x, y: y, force: true })
      }).catch(function(){});
    } else {
      // Add new token
      var npc = npcsList.find(function(n) { return n.id === npcId; });
      fetch('/api/map/token/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenId: npcId,
          name: npc ? npc.name : npcId,
          type: 'npc',
          x: x,
          y: y
        })
      }).catch(function(){});
    }
    placementNpcId = null;
    document.getElementById('placement-banner').classList.remove('active');
    setTimeout(loadNpcsList, 500);
  }

  function toggleNpcVisibility(npcId) {
    var tok = tokens[npcId];
    if (!tok) return;
    var newVisible = !!tok.hidden; // toggle
    fetch('/api/map/token/visibility', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tokenId: npcId, visible: newVisible })
    }).catch(function(){});
    tok.hidden = !newVisible;
    tok.visible = newVisible;
    setTimeout(loadNpcsList, 200);
    render();
  }

  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // Public API
  return {

    toggleControls: toggleControls,

    revealAll: revealAll,
    hideAll: hideAll,
    updateDisplay: updateDisplay,
    startPlace: startPlace,

      fetch('/api/map/token/reveal-to-players', {

    init: function() {

  function updateNavStrip() {
    fetch('/api/state').then(function(r) { return r.json(); }).then(function(s) {
      var iso = s && s.world && s.world.gameTime;
      var clockEl = document.getElementById('nav-clock');
      var todEl = document.getElementById('nav-tod');
      var wEl = document.getElementById('nav-weather');
      if (clockEl && iso) {
        var d = new Date(iso);
        clockEl.textContent = String(d.getUTCHours()).padStart(2, '0') + ':' + String(d.getUTCMinutes()).padStart(2, '0');
      }
      if (todEl && iso) {
        var h = new Date(iso).getUTCHours();
        var t = h < 5 ? 'NIGHT' : h < 8 ? 'DAWN' : h < 12 ? 'MORNING' : h < 17 ? 'AFTERNOON' : h < 20 ? 'EVENING' : 'NIGHT';
        todEl.textContent = t;
      }
      if (wEl) wEl.textContent = String((s && s.world && s.world.weather && s.world.weather.type) || 'CLEAR').toUpperCase();
    }).catch(function() {});
    fetch('/api/ai/health').then(function(r) { return r.json(); }).then(function(d) {
      var dot = document.getElementById('nav-ai-dot');
      var lab = document.getElementById('nav-ai-text');
      if (dot) {
        dot.className = 'nav-dot ' + (d.status === 'ONLINE' ? 'online' : 'offline');
        lab.textContent = 'AI ' + (d.status || '?');
      }
    }).catch(function() {});
  }
})();

DmMap.init();
</script>
</body>
</html>
